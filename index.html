<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1f1f1f;--border:rgba(255,255,255,0.08);--borderh:rgba(255,255,255,0.18);--text:#f0f0f0;--muted:#888;--dim:#555;--r:12px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{padding:24px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,14,14,0.93);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px;color:var(--text);text-decoration:none}
.logo span{color:var(--muted);font-weight:700}
.htag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.hero{padding:64px 40px 48px;max-width:760px;margin:0 auto;text-align:center}
h1{font-family:'Syne',sans-serif;font-size:clamp(34px,6vw,54px);font-weight:800;line-height:1.08;letter-spacing:-1.5px;margin-bottom:14px}
h1 em{font-style:normal;color:var(--muted)}
.sub{color:var(--muted);font-size:14px;font-weight:300;max-width:400px;margin:0 auto 36px}
.sw{position:relative;max-width:560px;margin:0 auto}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 52px 15px 20px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.sw input::placeholder{color:var(--dim)}
.sw input:focus{border-color:var(--borderh);box-shadow:0 0 0 3px rgba(255,255,255,.04)}
.sb{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--text);color:var(--bg);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sb:hover{opacity:.82}
.sb svg{width:15px;height:15px}
.ts{max-width:760px;margin:0 auto;padding:0 40px 40px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:36px;flex-wrap:wrap}
.tab{padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--muted)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab.soon{cursor:default;opacity:.3}
#res{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:26px 30px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--borderh)}
.ct{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:12px}
.cd{color:var(--muted);font-size:14px;line-height:1.78;font-weight:300}
.rc{font-size:12px;color:var(--dim);margin-bottom:20px;letter-spacing:.03em}
.nr{text-align:center;padding:56px 20px}
.nrt{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px}
.nrp{color:var(--muted);font-size:13px}
.es{text-align:center;padding:36px 20px}
.el{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:100px;font-size:13px;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--borderh);color:var(--text)}
footer{border-top:1px solid var(--border);padding:22px 40px;text-align:center;color:var(--dim);font-size:12px;margin-top:80px}
@media(max-width:600px){header{padding:18px 20px}.hero{padding:44px 20px 36px}.ts{padding:0 20px 40px}}
</style>
</head>
<body>
<header>
  <a class="logo" href="#">IB<span>Vault</span></a>
  <span class="htag">IB Revision</span>
</header>
<section class="hero">
  <h1>IBVault</h1>
  <p class="sub">Search any IB Economics concept or key term for a clean definition.</p>
  <div class="sw">
    <input type="text" id="q" placeholder="e.g. scarcity, GDP, externality..." autocomplete="off">
    <button class="sb" onclick="go()" aria-label="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</section>
<section class="ts">
  <div class="tabs">
    <button class="tab active">Economics</button>
    <button class="tab soon">Biology</button>
    <button class="tab soon">History</button>
    <button class="tab soon">Chemistry</button>
  </div>
  <div id="res"></div>
</section>
<footer>IBVault &mdash; built for IB students</footer>
<script>
const D=[
  {t:"Abnormal profit",d:"When a firm's average revenue is greater than its average costs."},
  {t:"Absolute Advantage",d:"The ability to produce the same quantity of a good or service using fewer resources per unit of time."},
  {t:"Absolute poverty",d:"The inability to afford the basic goods and services required to meet essential needs, when measured in relation to a fixed poverty line that indicates the minimum income required to cover basic necessities."},
  {t:"Administrative Barriers",d:"Bureaucratic rules and regulations imposed by governments to restrict imports and protect domestic industries."},
  {t:"Adverse selection",d:"When one of the sides has more knowledge about the quality of the product sold than the other."},
  {t:"Aggregate demand",d:"The total quantity of real output that all buyers in an economy (consumers, businesses, the government, and foreigners) are willing to purchase over a specific time period, at all possible price levels, ceteris paribus."},
  {t:"Aggregate supply",d:"The total output produced in an economy at all possible price levels, over a specific time period, ceteris paribus."},
  {t:"Allocative Efficiency",d:"Allocative efficiency refers to the situation where the market produces the socially desirable quantity of output. State of the economy in which the combination and quantity of goods and services produced is aligned with the preferences of consumers and producers, maximising social surplus."},
  {t:"Appreciation",d:"Appreciation is the increase in the value of a currency."},
  {t:"Asymmetric Information",d:"Refers to situation where buyers and sellers don't have the same access to information."},
  {t:"Automatic Stabilizers",d:"Factors without government interaction which automatically reduce the short-term business cycle fluctuations."},
  {t:"Average tax rate",d:"The average total proportion of income paid as tax."},
  {t:"Balance of Payments",d:"A statement or record of a country's economic transactions with all other countries over a specific time period (often a year)."},
  {t:"Behavioural economics",d:"A relatively recent field of economics founded on the notion that human behaviour is significantly more complex than the traditional assumptions of rational consumer choice."},
  {t:"Bond",d:"Refers to a signed certificate, which represents a loan given by the bond holder to the borrower in exchange for regular interest payments and the promise to repay the full amount at a set future date."},
  {t:"Business cycle",d:"Fluctuations in the growth of real output, characterised by alternating phases of expansion (rising real output) and contraction (falling real output)."},
  {t:"Capital",d:"Human-made factors of production used to produce goods and services."},
  {t:"Capital Account",d:"The capital account is the sum of the balance of capital transfers and transactions in non-produced, non financial assets."},
  {t:"Capital flight",d:"The large-scale and rapid movement of financial assets or capital from a country to foreign markets, often due to economic instability, political uncertainty, or fear of currency depreciation."},
  {t:"Carbon Tax",d:"A carbon tax is a tax which is imposed on per unit of carbon emitted."},
  {t:"Ceteris paribus",d:"A Latin expression that indicates all other variables besides those being considered are assumed to be unchanging."},
  {t:"Change",d:"The dynamic nature of economic activity, where prices, employment, output, and policies evolve over time in response to internal and external influences."},
  {t:"Choice",d:"The act of selecting among alternatives because of the scarcity of resources."},
  {t:"Choice Architecture",d:"The way in which options are showcased to decision-makers where there is emphasis on the design and environment to influence decisions."},
  {t:"Circular flow of income",d:"An income flow in an economy where the value of the output produced is equivalent the total income earned from its production, which is also equivalent to the expenditures spent on purchasing that output."},
  {t:"Circular flow of income model",d:"A model illustrating the flow of resources from households to firms, the movement of goods and services from firms to households, and the associated monetary flows, including household income generated from selling resources and firms revenues from selling their products."},
  {t:"Collective self-governance",d:"The situation where a common pool resources are given to the control of individuals for them to manage it in a sustainable manner."},
  {t:"Common Markets",d:"A form of trading bloc that builds on a customs union by allowing the free movement of goods, services, and factors of production (labour, capital, etc.) among member countries."},
  {t:"Common Pool Resources",d:"Natural resources which are available for use for everyone, but are susceptible to overuse and depletion."},
  {t:"Comparative Advantage",d:"A country having lower opportunity costs in the production of a good compared to another country."},
  {t:"Competitive Supply",d:"Goods or services in Competitive Supply are alternate use of resources of each other where they compete for the use of the same resources."},
  {t:"Complementary goods",d:"Goods that tend to be used together."},
  {t:"Composite Indicator",d:"A single measure that combines multiple individual indicators into one index to provide an overall assessment."},
  {t:"Concentration Ratio",d:"Concentration ratio measures the market share controlled by the larger firms in the market."},
  {t:"Consumer Price Index (CPI)",d:"A measure of the cost of living carried out by comparing the value of a basket of goods and services in a given year to a base year."},
  {t:"Consumer surplus",d:"The difference between the highest price consumers are willing and able to pay for a good or service and the actual price they end up paying."},
  {t:"Contractionary Fiscal Policy",d:"Fiscal policy aimed at reducing aggregate demand by decreasing government spending or increasing taxes."},
  {t:"Cost-push inflation",d:"A type of inflation caused by rising production costs, such as higher wages or input prices, which reduce aggregate supply and push the price level up."},
  {t:"Credit Rating",d:"Determined by international agencies, who rank countries with respect to how probable the country is to repay their loans completely and on time."},
  {t:"Current Account",d:"The current account is the sum of the balance of trade in goods and services, income and current transfers."},
  {t:"Customs Union",d:"A type of trading bloc that fits all the criteria of being an FTA but also adopts a common policy towards non-member countries."},
  {t:"Cyclical unemployment",d:"Cyclical unemployment occurs during economic downturns when demand for goods and services falls, leading to job losses."},
  {t:"Debt relief",d:"Partial or total cancellation, restructuring, or reduction of a country's debt obligations to help alleviate financial burdens and support economic recovery."},
  {t:"Deflation",d:"A sustained decrease in the general price level of goods and services in an economy over time, typically indicated by a negative inflation rate."},
  {t:"Demand",d:"Various quantities of a good or service that consumers are willing and able to buy at different possible prices during a particular time period, ceteris paribus."},
  {t:"Demand-pull inflation",d:"A type of inflation caused by an increase in aggregate demand that exceeds aggregate supply at the full employment level."},
  {t:"Demerit Good",d:"Goods that are not socially desirable but are over provided by the market."},
  {t:"Depreciation",d:"Depreciation is the decrease in the value of a currency."},
  {t:"Determinants of aggregate demand",d:"Factors that shift the aggregate demand curve by affecting its components: consumption (C), investment (I), government spending (G), and net exports (X - M)."},
  {t:"Determinants of short-run aggregate supply",d:"Factors that shift the SRAS curve."},
  {t:"Direct provision of services",d:"When the government directly delivers the goods/services to the public."},
  {t:"Direct tax",d:"Tax paid to the government directly by the taxpayer (individual)."},
  {t:"Disinflation",d:"A slowdown in the rate of inflation, meaning prices are still rising but at a slower pace compared to previous periods."},
  {t:"Diversification",d:"The process of expanding the range of products, services, or markets to reduce risk and enhance economic stability."},
  {t:"Dumping",d:"The sale of goods and services in international markets at a price that is lower than the cost of production."},
  {t:"Economic barriers",d:"Structural challenges that prevent countries from achieving sustainable economic growth and development."},
  {t:"Economic development",d:"The process of increasing real per capita income while improving living standards and reducing poverty within an economy as a whole."},
  {t:"Economic Diversification",d:"Shift of the economy from fewer to larger number of income sources."},
  {t:"Economic growth",d:"An increase in a country's real output (real GDP) over a period of time."},
  {t:"Economic inequality",d:"The degree of differences between an economy's individuals in their ability to satisfy their needs and wants due to monetary constraints."},
  {t:"Economic Integration",d:"Cooperation and coordination between countries and their economic policies, to make them more economically interconnected."},
  {t:"Economic well-being",d:"The level of prosperity, economic satisfaction, and standard of living experienced by members of an economy."},
  {t:"Economics",d:"The study of choices leading to the best possible use of scarce resources in order to best satisfy unlimited human needs and wants."},
  {t:"Economies of scale",d:"Reductions in average production costs that arise when a firm increases its output by scaling up all its inputs in the long run."},
  {t:"Efficiency",d:"Using scarce resources in the best possible way to avoid welfare loss."},
  {t:"Entrepreneurship",d:"The unique human skills held by some individuals, including the ability to innovate, take business risks, and pursue new opportunities for running a business."},
  {t:"Equality",d:"The even distribution of resources, opportunities, and outcomes among individuals or groups within a society."},
  {t:"Equity",d:"The condition of being fair and just. Refers to the concept where there is a fair resource distribution."},
  {t:"Exchange Rate",d:"An exchange rate is the value of one currency in terms of another currency."},
  {t:"Expansionary Fiscal Policy",d:"Fiscal policy aimed at increasing aggregate demand by increasing government spending and/or reducing (business and personal) taxes."},
  {t:"Expenditure reducing policies",d:"Policies that aim to reduce overall spending in the economy, including spending on imports."},
  {t:"Expenditure switching policies",d:"Policies that aim to switch spending from imports to domestic goods and services."},
  {t:"Externality",d:"The spillover effects on third parties, due to actions of consumers or producers."},
  {t:"Factors of production",d:"All resources or inputs used to produce goods and services."},
  {t:"Financial Account",d:"The financial account is the sum of foreign direct investment (FDI), portfolio investment, reserve assets and official borrowing."},
  {t:"Financial capital",d:"Investments in financial instruments, or the funds used to purchase financial instruments. A capital factor of production."},
  {t:"Fiscal Policy",d:"Refers to the influence of government spending and taxation to impact the aggregate demand."},
  {t:"Fixed Exchange Rate",d:"System where the central bank maintains the currency's value at a predetermined level rather than letting market forces decide it."},
  {t:"Floating Exchange Rate",d:"A floating exchange rate is a system in which the value of a currency is determined by supply and demand, without government intervention."},
  {t:"Foreign aid",d:"Provision of financial assistance, goods, and services to developing countries, with the primary purpose of improving their economic, social, and political conditions."},
  {t:"Foreign Direct Investment",d:"An FDI is an investment by a foreigner into another country, where the investor buys at least 10% of a business."},
  {t:"Free Trade",d:"An absence of government intervention in international trade, resulting in no imposing restrictions of any kind on imports and exports."},
  {t:"Free Trade Area",d:"The most common type of economic integration where a group of countries agree to gradually remove trade restrictions."},
  {t:"Frictional unemployment",d:"Frictional unemployment occurs when people are temporarily between jobs or entering the workforce for the first time."},
  {t:"Gini coefficient",d:"A numerical representation of the information given by the Lorenz Curve, measuring income or wealth inequality on an index from 0 (perfect equality) to 1 (perfect inequality)."},
  {t:"Government intervention",d:"When a government alters the resource allocation that markets would have achieved working freely on their own."},
  {t:"Gross Domestic Product (GDP)",d:"The market value of all final goods and services produced in an economy over a period of time (usually a year), regardless of who owns the factors of production."},
  {t:"Gross National Income (GNI)",d:"The total income earned by an economy's residents over a specific time period, equal to the market value of all final goods and services produced by the factors of production supplied by the economy's residents, regardless of the location of the factors of production."},
  {t:"Happiness Index",d:"An alternative to traditional national income statistics that measures economic well-being using numerous quality of life dimensions in addition to real GDP per capita."},
  {t:"Happy Planet Index",d:"An alternative to traditional national income statistics that accounts for environmental sustainability and inequalities as a measure of economic well-being."},
  {t:"Human capital",d:"Skills, abilities, good health, and knowledge utilized by people to increase their productivity."},
  {t:"Humanitarian aid",d:"Provision of resources and emergency assistance to people affected by natural disasters, conflicts, or crises, with the immediate aim of saving lives, alleviating suffering, and maintaining human dignity."},
  {t:"Incentive function of prices",d:"The ability of prices, and changes in prices, to provide information to consumers and producers that encourages them to act in their own best interest."},
  {t:"Income Elasticity of Demand",d:"A measure of the responsiveness of demand for changes in income."},
  {t:"Income of households",d:"The monetary funds households earn in return for their factors of production: rent from land, wages for labour, interest from investments, and profits from entrepreneurship."},
  {t:"Income taxes",d:"Taxes paid by households on their incomes."},
  {t:"Indicator",d:"Indicator is a metric to measure the level of a concept."},
  {t:"Indirect taxes",d:"Taxes levied on spending on goods and services. They are called indirect because while consumers contribute to part or all of the tax, it is the suppliers (firms) who collect and transfer these taxes to the government authorities (consumers pay the taxes indirectly)."},
  {t:"Inequality of opportunities",d:"Differences in life opportunities due to factors beyond an individual's control."},
  {t:"Infant Industry",d:"A new domestic industry that has not had the time to achieve production efficiencies and hence, not established itself yet."},
  {t:"Inferior goods",d:"A good whose demand decreases as consumer income increases."},
  {t:"Inflation Targeting",d:"A strategy where central banks set a specific inflation rate as their primary goal and adjust monetary policies respectively to meet the goal."},
  {t:"Inflationary gap",d:"A situation where the actual real output of an economy is above its full-employment level of output, resulting in unemployment being lower than the natural rate."},
  {t:"Informal economy",d:"Part of the economy that lies outside the formal economy, and involves economic activities that are unregistered and legally unregulated."},
  {t:"Injections",d:"The addition of funds into the income flow through investment, government spending, or exports."},
  {t:"Institutions",d:"The formal and informal rules, laws, and systems that structure economic, political, and social interactions, influencing decision-making, resource allocation, and economic development."},
  {t:"Interdependence",d:"The concept that economic decision-makers rely on and interact with one another, because no one can be entirely self-sufficient."},
  {t:"Interest rates",d:"Interest stated as a percentage. It represents the proportion of the amount of money borrowed charged as interest."},
  {t:"International Cooperation",d:"When countries work together to solve global problems and achieve shared goals through agreements and joint actions."},
  {t:"International Trade",d:"The exchange of goods and services between two or more countries."},
  {t:"Intervention",d:"Typically involving government action, it occurs when the government interacts with the workings of markets."},
  {t:"Joint Supply",d:"Goods or Services in Joint Supply are consequences of each other and derived from a single process or product."},
  {t:"Keynesian Multiplier",d:"The Keynesian multiplier is the proportional increase in real GDP that results from an initial injection into the economy."},
  {t:"Labour",d:"All the physical work and mental skills that humans put into the production of goods and services."},
  {t:"Land",d:"All natural resources on Earth, including farmland and non-farmland. All the natural resources found below and above the ground."},
  {t:"Law of Diminishing Marginal Returns",d:"As additional units of a variable input (e.g., labour) are added to fixed inputs (e.g., land), the marginal product increases by less and less each time, eventually decreasing."},
  {t:"Law of Diminishing Marginal Utility",d:"As more of a good is consumed, the additional satisfaction (marginal utility) gained from each extra unit decreases, and so consumers will only buy more of the good if its price falls."},
  {t:"Law of Supply",d:"There is a direct, positive relationship between price and quantity supplied."},
  {t:"Leakages",d:"The removal of funds from the income flow, represented by savings, taxes, or imports."},
  {t:"Lorenz curve",d:"A graphical representation of the income inequality within an economy."},
  {t:"Luxuries",d:"Goods and services that are not essential for ones living and often bought for leisure purposes."},
  {t:"Macroeconomic equilibrium",d:"The point where aggregate demand intersects aggregate supply, establishing the price level and the real output (real GDP) of an economy."},
  {t:"Macroeconomic objectives",d:"Key goals of governments in achieving economic stability include sustainable growth, low inflation, low unemployment, balanced trade, and income equality."},
  {t:"Macroeconomics",d:"The branch of economics that analyzes the economy as a whole by using aggregates."},
  {t:"Managed Exchange Rate",d:"System where the exchange rate is mainly determined by market forces, but the central bank occasionally intervenes to keep it close to a desired level."},
  {t:"Manufactured Products",d:"Goods or services produced by the workings of labour, capital and raw materials."},
  {t:"Marginal Benefit",d:"The benefit gained from consuming an additional unit of a good or service."},
  {t:"Marginal Cost",d:"The cost of producing an additional unit of output."},
  {t:"Marginal Product",d:"The additional output that results from adding one extra unit of a variable input (e.g., labour)."},
  {t:"Marginal tax rate",d:"The percentage of tax paid on the next dollar earned."},
  {t:"Marginal utility",d:"The satisfaction obtained from consuming one more unit of a good or service."},
  {t:"Market",d:"Any arrangement that connects buyers and sellers, enabling them to carry out an exchange."},
  {t:"Market Equilibrium",d:"When quantity demanded is equal to quantity supplied, and there is no tendency for the price to change."},
  {t:"Market Failure",d:"Occurs when firms fail to efficiently allocate the resources within an economy."},
  {t:"Market power",d:"The degree to which a firm in a market is able to control its output price."},
  {t:"Market share",d:"The percentage of total sales in the market, which a firm is part of, that the firm generates."},
  {t:"Market Supply",d:"The sum of the supplies of all individual firms within a market for the good."},
  {t:"Marshall-Lerner Condition",d:"A condition which determines the level of success a depreciation or devaluation of a currency rate of exchange will have on improving a current account deficit in the balance of payments."},
  {t:"Merit Good",d:"Goods that are desirable by society but are under provided by the market."},
  {t:"Microeconomics",d:"The branch of economics that studies the behaviour of consumers and firms in making decision regarding the allocation of resources."},
  {t:"Monetary Policy",d:"Monetary policy refers to the adjustments of the interest rates and the availability of money in the economy set by the central bank."},
  {t:"Monetary Union",d:"A common market between countries who also share a common currency and a common central bank."},
  {t:"Money Multiplier",d:"The money multiplier is a concept that quantifies the total amount of money created in the economy from an initial deposit."},
  {t:"Monopoly",d:"A market structure with one single dominant firm that has substantial control over output prices. The firm sells a unique product and is protected by high barriers to entry."},
  {t:"Moral Hazard",d:"A situation where one part takes a risk but is not responsible for covering all of the costs because they are being covered by the other party."},
  {t:"Multilateral development assistance",d:"A form of international aid where multiple countries or international organizations work together to provide financial, technical, and humanitarian support to developing nations."},
  {t:"Multinational Corporation",d:"An MNC is a firm that undertakes foreign direct investment (FDI)."},
  {t:"Nash Equilibrium",d:"Nash equilibrium refers to a situation where none of the players can improve their position by making another choice."},
  {t:"National income",d:"The total income of an economy, composed of the sum of wages, interest, rent and profit."},
  {t:"National income accounting",d:"The measurement of an economy's national income and output, as well as other measures of economic activity."},
  {t:"National output",d:"The total value of the final goods and services produced by an economy, often measured by real GDP. It is also known as aggregate output."},
  {t:"Natural monopoly",d:"A monopoly that can serve the entire market at a lower average cost than if the market were divided among smaller firms. This occurs when the total market demand is small enough for the monopoly to benefit from economies of scale, keeping its long-run average costs falling."},
  {t:"Natural rate of unemployment",d:"The level of unemployment that persists even when the economy is operating at full-employment. It consists of the sum of structural, frictional, and seasonal unemployment."},
  {t:"Necessities",d:"Goods or services crucial for ones life and extremely difficult to live without."},
  {t:"Negative Production Externality",d:"Negative Production Externalities are spillover costs passed on to third parties from the production of a good, which are not reflected in the market price."},
  {t:"Nominal Interest Rate",d:"The market interest rate before inflation is taken into account."},
  {t:"Non-Price Determinants of Demand",d:"Factors, other than price, that can affect the demand of consumers and shift the demand curve."},
  {t:"Non-Price Determinants of Supply",d:"Factors, other than price, that can affect the supply of a firm (or multiple firms) and shift the supply curve."},
  {t:"Normal goods",d:"A good whose demand increases as consumer income increases."},
  {t:"Normal profit",d:"When a firm's total revenue exactly covers total costs. It is the minimum level of profit that the firm needs to earn in order to remain in the market in long term."},
  {t:"Normative economics",d:"Way of thinking in economics that focuses on opinions and value judgments about what should or ought to happen in economic systems."},
  {t:"Nudge",d:"A method used to influence the decision of a consumer in a desirable way, without offering any financial incentives or imposing any legal regulations over them."},
  {t:"OECD Better Life Index",d:"An alternative to traditional national income statistics that evaluates economic well-being across multiple dimensions, incorporating aspects that account for the quality of life."},
  {t:"Oligopoly",d:"A market structure dominated by a few large firms."},
  {t:"Opportunity cost",d:"The value of the next best option that must be forgone or sacrificed in order to acquire something else."},
  {t:"Overvalued Currency",d:"Where the value of a currency is kept higher than its equilibrium level by government or central bank intervention."},
  {t:"Pegging Currency",d:"Pegging currency means the central bank sets and maintains the value of the domestic currency relative to another currency."},
  {t:"Perfect competition",d:"A market structure with a large number of small firms that have no control over output prices. All firms sell an undifferentiated product and there are no barriers to entry."},
  {t:"Physical capital",d:"Capital factors of production used to produce more goods and services in the future."},
  {t:"Pigouvian taxes",d:"Form of tax imposed on activities that generate negative externalities."},
  {t:"Portfolio Investment",d:"A financial investment by a foreigner, such as the purchase of stocks."},
  {t:"Positive Consumption Externality",d:"Occurs when the consumption of a good/service leaves positive spillover effects on third-parties."},
  {t:"Positive economics",d:"Way of thinking in economics that focuses on describing, explaining, and predicting economic events."},
  {t:"Positive Production Externality",d:"When the production of a good/service has a positive spillover effects on third parties."},
  {t:"Poverty",d:"The inability to meet standard consumption needs. These standards can be absolute or relative."},
  {t:"Poverty cycle",d:"A self-reinforcing cycle where low income leads to limited access to resources, which in turn prevents individuals or communities from improving their economic situation."},
  {t:"Preferential Trade Agreements",d:"An agreement between countries to reduce the amount of trade restrictions imposed between them on specific products."},
  {t:"Price ceiling",d:"A maximum price, below the equilibrium price, set by the government for a particular good or service."},
  {t:"Price controls",d:"Refers to the setting of a maximal/minimal price above/below the equilibrium price by the government."},
  {t:"Price Elasticity of Demand (PED)",d:"A measure of the responsiveness of quantity demanded when there is a price change."},
  {t:"Price Elasticity of Supply",d:"A measure of the responsiveness of quantity supplied when there is a change in price."},
  {t:"Price floor",d:"A minimum price set by the government for a good, above the equilibrium price."},
  {t:"Primary Commodities",d:"Goods and services that directly come from natural resources or using the factor of production called land."},
  {t:"Primary sector",d:"The sector of the economy that produces primary commodities, which are goods arising from the factor of production land."},
  {t:"Producer surplus",d:"The difference between the price sellers receive and the lowest price that they are willing and able to accept."},
  {t:"Production possibilities curve (PPC)",d:"Curve that illustrates all possible combinations of two goods that an economy can produce at maximum output when using all available resources and current technology efficiently."},
  {t:"Profit",d:"The money left for a firm after the total costs have been subtracted from total revenue."},
  {t:"Profit as factor payment",d:"Payments, per unit time, made to the owners of entrepreneurship (one of the factors of production)."},
  {t:"Public Good",d:"A good that is both non-rivalrous and non-excludable at the same time."},
  {t:"Purchasing power",d:"The ability of a given amount of money to buy goods and services, which depends on the prices of those goods and services. A fixed amount of money with higher purchasing power can buy more goods and services than the same amount with lower purchasing power."},
  {t:"Purchasing Power Parity (PPP) exchange rates",d:"Special exchange rates designed that equal the purchasing power of different currencies to that of 1 US dollar."},
  {t:"Quantitative Easing",d:"A monetary policy where the central bank purchases financial assets from the market to increase the money supply."},
  {t:"Quota",d:"Limit to the quantity of a certain good that can be imported over a particular period of time."},
  {t:"Rational consumer choice",d:"Economic theory where consumers make choices in their best self-interest trying to maximize utility."},
  {t:"Rational Producer Behaviour",d:"The act of aiming to maximise profits. The goal of firms, according to the standard theory of the firm."},
  {t:"Rationing",d:"Method to divide and apportion goods or services amongst consumers."},
  {t:"Real Interest Rate",d:"The interest rate which has been adjusted for inflation."},
  {t:"Recession",d:"Sustained falling real output in an economy (a contraction in the business cycle) lasting two consecutive quarters (6 months)."},
  {t:"Recessionary gap",d:"When the actual real output of an economy is below its full-employment level of output, resulting in unemployment being higher than the natural rate."},
  {t:"Regulation",d:"Establishment of requirements and standards to regulate behaviour."},
  {t:"Relative poverty",d:"The inability to afford the standard of goods and services considered typical in their society."},
  {t:"Remittance",d:"Remittances refer to situations where family members or friends send money from abroad."},
  {t:"Resource allocation",d:"Assigning available resources or factors of production to particular uses selected from various possible options."},
  {t:"Revenue",d:"The money earned by a firm, over a period of time, from selling goods and services."},
  {t:"Risk of Default",d:"The risk of not being able to pay accumulating debt back when country is borrowing for long periods of time."},
  {t:"Scarcity",d:"The idea that available resources (land, labour, capital, entrepreneurship) are limited and unable to satisfy unlimited human needs and wants."},
  {t:"Screening",d:"A situation when the party with the less information is trying to get more information about the good/service."},
  {t:"Seasonal unemployment",d:"Seasonal unemployment arises when jobs are only available during certain times of the year."},
  {t:"Short-run aggregate supply (SRAS)",d:"The total output produced in an economy at all possible price levels, when the costs of factors of production are fixed, ceteris paribus."},
  {t:"Shortage",d:"The excess of quantity demanded over quantity supplied."},
  {t:"Signalling",d:"Signaling is a method used by the party with more information, to convince the party with less information that the good/service included in the transaction is of good quality."},
  {t:"Signalling function of prices",d:"The capacity of prices, and changes in prices, to convey information to consumers and producers about the existence of shortages or surpluses in markets, achieving an efficient allocation of resources."},
  {t:"Social science",d:"Any academic field that examines human society and social relationships, focusing on uncovering general principles that explain how societies operate and are structured."},
  {t:"Social surplus",d:"The sum of consumer surplus and producer surplus. Maximised in the free market, when the market operates at its equilibrium point."},
  {t:"Socially Optimum Output",d:"The level of production that achieves allocative efficiency, where the allocation of resources results in the most beneficial outcome for society as a whole, maximising social welfare."},
  {t:"Speculation of a Currency",d:"Speculation refers to the buying and selling of currencies to profit from fluctuations in exchange rates."},
  {t:"Structural unemployment",d:"Structural unemployment happens when there is a mismatch between workers skills and available jobs."},
  {t:"Subsidy",d:"Monetary help (direct or indirect payment) offered by the government to firms (sometimes households) to aid in lowering costs of production."},
  {t:"Substitute goods",d:"Goods that satisfy a similar need."},
  {t:"Supply",d:"The quantity of a good or service a firm (or multiple firms) is willing and able to produce for a given price in a given time period, ceteris paribus."},
  {t:"Supply-side policies",d:"Government policies aimed at increasing the productive capacity of the economy and improving market efficiency."},
  {t:"Surplus",d:"The extra supply that results when quantity supplied is greater than quantity demanded."},
  {t:"Sustainability",d:"Using resources in a way that meets current needs without compromising the ability of future generations to meet their own needs. Preserving the capacity of the environment and the economy to continue to produce and satisfy the needs and wants of future generations."},
  {t:"Sustainable Development",d:"Refers to the ability of the current generation to meet their needs without compromising the ability of future generations to meet theirs."},
  {t:"Tariffs",d:"Also known as customs duties, they are taxes imposed on imported goods."},
  {t:"Taxes",d:"Mandatory payments made by households and firms, collected by governments."},
  {t:"The Free Rider Problem",d:"When a person enjoys a benefit of a good/service without paying for it."},
  {t:"The Law of Demand",d:"The law of demand states that, as the price of a good increases, the quantity demanded decreases, ceteris paribus."},
  {t:"The Tragedy of Commons",d:"A situation where individuals, acting in their own self-interest, overuse and degrade a shared resource, causing long-term harm to the resource and society."},
  {t:"Total Revenue",d:"Amount of money received by firms when they sell a good (or service)."},
  {t:"Tradable Permits",d:"A legal cap set by the government, limiting the amount of emissions that can be emitted. Each firm are provided a set of permits, which can be exchanged with other firms."},
  {t:"Trade Creation",d:"Scenario where lower cost imports are replaced with higher cost imports or domestic production."},
  {t:"Trade Diversion",d:"Scenario where higher cost imports from a member country replace lower cost imports due to the formation of the trading bloc."},
  {t:"Trade Liberalization",d:"To free up international trade by removing trade barriers."},
  {t:"Trade Protection",d:"When the government intervenes in international trade by imposing restrictions to reduce free imports."},
  {t:"Trading Bloc",d:"Group of countries encouraging free trade and economic integration through the reduction of trade barriers between them."},
  {t:"Transfer payments",d:"Transfer payments are redistributions of income by the government to individuals or households without any exchange of goods or services."},
  {t:"Undervalued Currency",d:"Situation where the currency's value is kept lower than its equilibrium level, making exports cheaper and imports more expensive."},
  {t:"Unemployment",d:"When people of working age (16-65) who are actively seeking and able to work, but are not employed."},
  {t:"Unemployment Rate",d:"The number of unemployed people expressed as a percentage of the labor force."},
  {t:"Universal Basic Income",d:"Universal Basic Income (UBI) is a policy where the government provides a fixed amount of money to every citizen, regardless of their income or employment status."},
  {t:"Utility",d:"The satisfaction obtained from consuming a good or service."},
  {t:"Wealth",d:"The total value of someone's owned assets (savings, stocks, bonds, land, properties...) minus their debts."},
  {t:"Wealth Inequality",d:"Refers to the unequal levels of wealth that individuals own."},
  {t:"Welfare loss",d:"The reduction in social surplus that occurs when marginal social benefits (MSB) are not equal to marginal social costs (MSC), typically as a result of market failure."},
  {t:"World Trade Organisation (WTO)",d:"International organisation who is in charge of regulating and facilitating international trade."}
];

const P=["Scarcity","Opportunity cost","Market Failure","Externality","Gross Domestic Product (GDP)","Inflation Targeting","Fiscal Policy","Monopoly","Price Elasticity of Demand (PED)","Supply"];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function empty(){
  const chips = P.map(p => `<button class="chip" onclick="pick(this.textContent)">${p}</button>`).join('');
  document.getElementById('res').innerHTML = `<div class="es"><div class="el">Popular terms &mdash; ${D.length} terms total</div><div class="chips">${chips}</div></div>`;
}

function pick(v){ document.getElementById('q').value = v; go(); }

function card(e){
  return `<div class="card"><div class="ct">${esc(e.t)}</div><div class="cd">${esc(e.d)}</div></div>`;
}

function go(){
  const raw = document.getElementById('q').value.trim();
  if(!raw){ empty(); return; }
  const q = raw.toLowerCase();
  const exact = D.filter(e => e.t.toLowerCase() === q);
  const starts = D.filter(e => e.t.toLowerCase() !== q && e.t.toLowerCase().startsWith(q));
  const contains = D.filter(e => e.t.toLowerCase() !== q && !e.t.toLowerCase().startsWith(q) && (e.t.toLowerCase().includes(q) || e.d.toLowerCase().includes(q)));
  const m = [...exact, ...starts, ...contains];
  const el = document.getElementById('res');
  if(!m.length){
    el.innerHTML = `<div class="nr"><div class="nrt">No results for &ldquo;${esc(raw)}&rdquo;</div><p class="nrp">Try a different spelling or keyword.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="rc">${m.length} result${m.length !== 1 ? 's' : ''}</div>` + m.map(card).join('');
}

document.getElementById('q').addEventListener('input', go);
document.getElementById('q').addEventListener('keydown', e => { if(e.key === 'Enter') go(); });

empty();
</script>
</body>
</html>
