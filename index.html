<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #666666;
      --accent: #e8e0d0;
      --hl: #c8b89a;
      --sl: #7a9cb8;
      --tag-bg: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2.5rem 2rem 0;
      max-width: 860px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      color: var(--hl);
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin: 2rem auto 0;
      max-width: 860px;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.soon { opacity: 0.35; cursor: default; }

    .search-wrap {
      max-width: 860px;
      margin: 2rem auto 0;
      padding: 0 2rem;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: #333;
    }

    #searchInput::placeholder { color: var(--muted); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }

    .chip {
      padding: 0.35rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      color: var(--text);
      border-color: #333;
    }

    .results-wrap {
      max-width: 860px;
      margin: 1.5rem auto 4rem;
      padding: 0 2rem;
    }

    .results-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 1rem;
      letter-spacing: 0.03em;
    }

    .cards {
      display: grid;
      gap: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.4rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #2a2a2a; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .badges {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .badge {
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge-hl {
      background: rgba(200,184,154,0.12);
      color: var(--hl);
      border: 1px solid rgba(200,184,154,0.25);
    }

    .badge-sl {
      background: rgba(122,156,184,0.12);
      color: var(--sl);
      border: 1px solid rgba(122,156,184,0.25);
    }

    .card-def {
      font-size: 0.875rem;
      color: #aaaaaa;
      line-height: 1.6;
      font-weight: 300;
    }

    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .coming-soon {
      text-align: center;
      padding: 5rem 0;
      color: var(--muted);
    }

    .coming-soon h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">IB<span>Vault</span></div>
  <div class="subtitle">Economics · Definitions &amp; Concepts</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="econ">Economics</button>
  <button class="tab soon" data-tab="bio">Biology</button>
  <button class="tab soon" data-tab="hist">History</button>
  <button class="tab soon" data-tab="chem">Chemistry</button>
  <button class="tab soon" data-tab="psych">Psychology</button>
</div>

<div id="econTab">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search terms, diagrams, concepts…" autocomplete="off">
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="results-wrap">
    <div class="results-meta" id="resultsMeta"></div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<div id="otherTab" style="display:none;" class="coming-soon">
  <h2>Coming soon</h2>
  <p>This subject is on the way.</p>
</div>

<script>
const terms = [
  { title: "Abnormal profit", hl: true, sl: true, def: "When a firm's average revenue is greater than its average costs." },
  { title: "Absolute Advantage", hl: true, sl: true, def: "The ability to produce the same quantity of a good or service using fewer resources per unit of time." },
  { title: "Absolute poverty", hl: true, sl: true, def: "The inability to afford the basic goods and services required to satisfy the most basic human needs." },
  { title: "Allocative efficiency", hl: true, sl: true, def: "A situation where resources are distributed such that they satisfy consumer needs and wants at minimum cost. It occurs when price equals marginal cost (P = MC)." },
  { title: "Appreciation", hl: true, sl: true, def: "An increase in the value of a currency in a floating exchange rate system." },
  { title: "Asymmetric information", hl: true, sl: true, def: "When buyers and sellers in a market have access to different information, which can lead to market failure." },
  { title: "Average cost", hl: true, sl: true, def: "Total cost divided by the quantity of output produced (AC = TC/Q)." },
  { title: "Average fixed cost", hl: true, sl: true, def: "Fixed costs divided by the quantity of output (AFC = TFC/Q). AFC always falls as output rises." },
  { title: "Average revenue", hl: true, sl: true, def: "Total revenue divided by quantity sold (AR = TR/Q). AR is equal to the price in all market structures." },
  { title: "Average variable cost", hl: true, sl: true, def: "Variable costs divided by the quantity of output (AVC = TVC/Q)." },
  { title: "Balance of payments", hl: true, sl: true, def: "A record of all financial transactions between the residents of a country and the rest of the world over a period of time." },
  { title: "Balance of trade in goods", hl: true, sl: true, def: "The difference between the value of a country's exports of goods and its imports of goods." },
  { title: "Balance of trade in services", hl: true, sl: true, def: "The difference between the value of a country's exports of services and its imports of services." },
  { title: "Barriers to entry", hl: true, sl: true, def: "Obstacles that make it difficult or impossible for new firms to enter a market, such as high startup costs, patents, or government regulation." },
  { title: "Bilateral aid", hl: true, sl: true, def: "Aid given directly from one country to another country." },
  { title: "Bimodal income distribution", hl: true, sl: false, def: "An income distribution with two peaks, suggesting a polarised society with a large gap between rich and poor." },
  { title: "Bond", hl: true, sl: true, def: "A financial instrument issued by governments or firms to raise funds. The buyer of the bond lends money to the issuer in exchange for regular interest payments and repayment of the principal at maturity." },
  { title: "Budget deficit", hl: true, sl: true, def: "When government expenditure exceeds government revenue over a given time period." },
  { title: "Budget surplus", hl: true, sl: true, def: "When government revenue exceeds government expenditure over a given time period." },
  { title: "Capital account", hl: true, sl: true, def: "A component of the balance of payments that records transfers of capital, such as debt forgiveness and migrants' transfers." },
  { title: "Capital flight", hl: true, sl: false, def: "The rapid outflow of money and assets from a country due to political or economic instability." },
  { title: "Capital goods", hl: true, sl: true, def: "Manufactured goods that are used to produce other goods and services, such as machinery and equipment." },
  { title: "Cartel", hl: true, sl: true, def: "A formal agreement between firms in an oligopoly to collude and act as a monopoly, fixing prices and/or output to maximise joint profits." },
  { title: "Central bank", hl: true, sl: true, def: "A national institution responsible for regulating the money supply, setting interest rates and overseeing the banking system." },
  { title: "Circular flow of income", hl: true, sl: true, def: "A model that shows how money flows between households and firms in an economy through product markets and factor markets." },
  { title: "Collusion", hl: true, sl: true, def: "An agreement (formal or informal) between firms in an oligopoly to cooperate, for example by fixing prices or dividing markets." },
  { title: "Commodity", hl: true, sl: true, def: "A raw material or primary product that can be bought or sold, such as gold, oil, or wheat." },
  { title: "Comparative advantage", hl: true, sl: true, def: "The ability of a country to produce a good or service at a lower opportunity cost than other countries." },
  { title: "Complementary goods", hl: true, sl: true, def: "Goods that are consumed together. An increase in the price of one good leads to a fall in demand for the complementary good." },
  { title: "Consumer price index (CPI)", hl: true, sl: true, def: "A measure of inflation that tracks the changes in the weighted average price of a basket of consumer goods and services over time." },
  { title: "Consumer surplus", hl: true, sl: true, def: "The difference between the maximum price consumers are willing and able to pay for a good and the price they actually pay. It is the area below the demand curve and above the market price." },
  { title: "Consumption", hl: true, sl: true, def: "Total spending on goods and services by households in an economy." },
  { title: "Contractionary fiscal policy", hl: true, sl: true, def: "Government policy involving a reduction in government spending or an increase in taxes in order to reduce aggregate demand." },
  { title: "Contractionary monetary policy", hl: true, sl: true, def: "Central bank policy involving raising interest rates or reducing the money supply in order to reduce aggregate demand and inflation." },
  { title: "Cost-push inflation", hl: true, sl: true, def: "A rise in the general price level caused by an increase in the costs of production, such as higher wages or raw material prices, leading to a leftward shift of the SRAS curve." },
  { title: "Cross-price elasticity of demand (XED)", hl: true, sl: true, def: "A measure of the responsiveness of demand for one good to a change in the price of another good. XED = % change in Qd of good A / % change in price of good B." },
  { title: "Crowding out", hl: true, sl: true, def: "When increased government borrowing raises interest rates, reducing private sector investment spending." },
  { title: "Current account", hl: true, sl: true, def: "A component of the balance of payments that records trade in goods and services, income flows and current transfers between a country and the rest of the world." },
  { title: "Current account deficit", hl: true, sl: true, def: "When the value of a country's imports of goods and services plus outflows of income and transfers exceeds its exports and inflows." },
  { title: "Current account surplus", hl: true, sl: true, def: "When the value of a country's exports of goods and services plus inflows of income and transfers exceeds its imports and outflows." },
  { title: "Customs union", hl: true, sl: true, def: "A form of trade bloc where member countries remove trade barriers with each other and also adopt a common external tariff on imports from non-member countries." },
  { title: "Cyclical unemployment", hl: true, sl: true, def: "Unemployment caused by a fall in aggregate demand during a recession or economic downturn. It is also known as demand-deficient unemployment." },
  { title: "Deadweight loss", hl: true, sl: true, def: "A loss of economic efficiency that occurs when equilibrium is not achieved, such as under monopoly, taxation, or market failure. It represents the decrease in total welfare." },
  { title: "Debt relief", hl: true, sl: false, def: "The reduction or cancellation of debt owed by developing countries, often negotiated to free up resources for development." },
  { title: "Deflation", hl: true, sl: true, def: "A sustained decrease in the general price level of goods and services." },
  { title: "Demand-pull inflation", hl: true, sl: true, def: "A rise in the general price level caused by an increase in aggregate demand in the economy." },
  { title: "Demerit good", hl: true, sl: true, def: "A good that is over-consumed because individuals do not consider the full social costs of consumption. It has negative externalities and may be subject to government intervention." },
  { title: "Depreciation", hl: true, sl: true, def: "A decrease in the value of a currency in a floating exchange rate system." },
  { title: "Devaluation", hl: true, sl: true, def: "A reduction in the value of a currency in a fixed exchange rate system, implemented by the government or central bank." },
  { title: "Development", hl: true, sl: true, def: "A process of improving the economic, social and political wellbeing of a country and its people." },
  { title: "Diminishing marginal returns", hl: true, sl: true, def: "The principle that as more units of a variable factor of production are added to a fixed factor, output will eventually increase at a diminishing rate." },
  { title: "Direct taxes", hl: true, sl: true, def: "Taxes levied directly on income, profits or wealth, such as income tax or corporation tax." },
  { title: "Diseconomies of scale", hl: true, sl: true, def: "A situation where long-run average costs increase as a firm expands its output." },
  { title: "Disinflation", hl: true, sl: true, def: "A reduction in the rate of inflation (but still positive)." },
  { title: "Disposable income", hl: true, sl: true, def: "Income remaining after direct taxes have been deducted and state benefits have been added." },
  { title: "Dumping", hl: true, sl: true, def: "When a country exports a product at a price below its domestic price or cost of production, often to drive competitors out of a foreign market." },
  { title: "Economic development", hl: true, sl: true, def: "Improvements in economic indicators, living standards, health, education, and overall wellbeing of a country's population." },
  { title: "Economic growth", hl: true, sl: true, def: "An increase in the real output of goods and services in an economy over time, usually measured as a percentage change in real GDP." },
  { title: "Economies of scale", hl: true, sl: true, def: "A reduction in long-run average costs as a firm increases its scale of production." },
  { title: "Elasticity of supply", hl: true, sl: true, def: "A measure of the responsiveness of quantity supplied to a change in price. PES = % change in Qs / % change in price." },
  { title: "Equity", hl: true, sl: true, def: "Fairness in the distribution of income and wealth among individuals in an economy." },
  { title: "Exchange rate", hl: true, sl: true, def: "The price at which one currency can be exchanged for another." },
  { title: "Expenditure approach", hl: true, sl: true, def: "A method of calculating GDP by summing all spending on final goods and services: GDP = C + I + G + (X – M)." },
  { title: "Expenditure-reducing policies", hl: true, sl: true, def: "Policies that aim to reduce a current account deficit by decreasing income and therefore imports, such as contractionary fiscal or monetary policy." },
  { title: "Expenditure-switching policies", hl: true, sl: true, def: "Policies that aim to improve the current account by switching domestic demand away from imports toward domestically produced goods, such as devaluation or tariffs." },
  { title: "Externalities", hl: true, sl: true, def: "Costs or benefits that affect third parties who are not involved in the production or consumption of a good or service." },
  { title: "Factor markets", hl: true, sl: true, def: "Markets where factors of production (land, labour, capital, enterprise) are bought and sold." },
  { title: "Financial account", hl: true, sl: true, def: "A component of the balance of payments that records investment flows, including foreign direct investment, portfolio investment and reserve assets." },
  { title: "Fiscal policy", hl: true, sl: true, def: "The use of government spending and taxation to influence aggregate demand and macroeconomic objectives." },
  { title: "Fixed costs", hl: true, sl: true, def: "Costs that do not change with the level of output in the short run, such as rent or salaries." },
  { title: "Fixed exchange rate", hl: true, sl: true, def: "An exchange rate system where the value of a currency is pegged to another currency or a fixed value." },
  { title: "Floating exchange rate", hl: true, sl: true, def: "An exchange rate system where the value of a currency is determined by supply and demand in the foreign exchange market." },
  { title: "Foreign direct investment (FDI)", hl: true, sl: true, def: "Investment by a company in production facilities in a foreign country, involving a lasting interest in or management control over an enterprise." },
  { title: "Free rider problem", hl: true, sl: true, def: "When individuals can enjoy a public good without paying for it, leading to under-provision if left to the market." },
  { title: "Free trade", hl: true, sl: true, def: "Trade between countries without tariffs, quotas or other trade barriers." },
  { title: "Free trade area", hl: true, sl: true, def: "A trade bloc where member countries agree to eliminate trade barriers amongst themselves but maintain their own separate external trade policies." },
  { title: "Frictional unemployment", hl: true, sl: true, def: "Unemployment that occurs when workers are between jobs or are searching for a new job that suits their skills." },
  { title: "Full employment", hl: true, sl: true, def: "A situation where all those willing and able to work at the prevailing wage rate are employed. Some frictional unemployment may still exist." },
  { title: "Gini coefficient", hl: true, sl: true, def: "A statistical measure of income inequality within a country, ranging from 0 (perfect equality) to 1 (maximum inequality)." },
  { title: "Government failure", hl: true, sl: true, def: "When government intervention in a market leads to a worse outcome than the market without intervention." },
  { title: "Gross domestic product (GDP)", hl: true, sl: true, def: "The total monetary value of all final goods and services produced within a country in a given time period." },
  { title: "Gross national income (GNI)", hl: true, sl: true, def: "The total income earned by a country's residents and businesses regardless of where it is produced, including net income from abroad." },
  { title: "Hard peg", hl: true, sl: false, def: "A form of fixed exchange rate where a country's currency is rigidly fixed to another, with no room for adjustment, such as a currency board or dollarisation." },
  { title: "Human Development Index (HDI)", hl: true, sl: true, def: "A composite measure of development that combines indicators of health (life expectancy), education (mean and expected years of schooling) and income (GNI per capita)." },
  { title: "Hyperinflation", hl: true, sl: true, def: "An extremely high and typically accelerating rate of inflation, often defined as monthly inflation exceeding 50%." },
  { title: "Income approach", hl: true, sl: true, def: "A method of calculating GDP by summing all incomes earned in the production of output, including wages, profits, rents and interest." },
  { title: "Income elasticity of demand (YED)", hl: true, sl: true, def: "A measure of the responsiveness of demand for a good to a change in consumer income. YED = % change in Qd / % change in income." },
  { title: "Indirect taxes", hl: true, sl: true, def: "Taxes levied on the sale of goods and services, such as VAT or excise duties, which can be passed on to consumers." },
  { title: "Inequality", hl: true, sl: true, def: "The unequal distribution of income or wealth among individuals or groups in a society." },
  { title: "Inferior good", hl: true, sl: true, def: "A good for which demand falls as consumer income rises (negative income elasticity of demand)." },
  { title: "Inflation", hl: true, sl: true, def: "A sustained increase in the general price level of goods and services in an economy." },
  { title: "Inflationary gap", hl: true, sl: true, def: "A situation where actual output exceeds the potential output of the economy, causing inflation. Aggregate demand is greater than aggregate supply at full employment." },
  { title: "Interest rate", hl: true, sl: true, def: "The cost of borrowing money, expressed as a percentage of the amount borrowed per year." },
  { title: "Investment", hl: true, sl: true, def: "Expenditure by firms on capital goods such as machinery, equipment and buildings." },
  { title: "J-curve effect", hl: true, sl: true, def: "The pattern where a depreciation of the exchange rate initially worsens the current account before eventually improving it, due to the time lag before exports and imports respond to price changes." },
  { title: "Keynesian economics", hl: true, sl: true, def: "An economic theory developed by John Maynard Keynes that supports active government intervention through fiscal policy to stabilise aggregate demand and reduce unemployment." },
  { title: "Keynesian multiplier", hl: true, sl: true, def: "The ratio of the change in national income to the initial change in spending that caused it. Multiplier = 1 / MPS (or 1 / (1 – MPC))." },
  { title: "Labour force", hl: true, sl: true, def: "All individuals who are either employed or actively seeking employment." },
  { title: "Labour productivity", hl: true, sl: true, def: "The output produced per worker per unit of time." },
  { title: "Law of demand", hl: true, sl: true, def: "As the price of a good rises, the quantity demanded falls, ceteris paribus." },
  { title: "Law of supply", hl: true, sl: true, def: "As the price of a good rises, the quantity supplied increases, ceteris paribus." },
  { title: "Liquidity trap", hl: true, sl: false, def: "A situation where interest rates are very low and consumers prefer to hold cash rather than invest or spend, making monetary policy ineffective." },
  { title: "Long run", hl: true, sl: true, def: "A time period in which all factors of production are variable and firms can enter or exit the market." },
  { title: "Long-run aggregate supply (LRAS)", hl: true, sl: true, def: "The total output of the economy when all resources are fully employed, represented as a vertical line at potential GDP." },
  { title: "Lorenz curve", hl: true, sl: true, def: "A graphical representation of income distribution that shows the cumulative percentage of income earned by cumulative percentages of the population." },
  { title: "Luxury good", hl: true, sl: true, def: "A good with an income elasticity of demand greater than 1, meaning demand rises proportionally more than income." },
  { title: "Macroeconomic objectives", hl: true, sl: true, def: "The main goals of government economic policy, typically including low inflation, low unemployment, economic growth and a stable balance of payments." },
  { title: "Managed exchange rate", hl: true, sl: true, def: "An exchange rate that is primarily determined by market forces but with occasional government or central bank intervention to influence the exchange rate." },
  { title: "Marginal cost", hl: true, sl: true, def: "The additional cost incurred by producing one more unit of output (MC = ΔTC / ΔQ)." },
  { title: "Marginal propensity to consume (MPC)", hl: true, sl: true, def: "The fraction of additional income that is spent on consumption (MPC = ΔC / ΔY)." },
  { title: "Marginal propensity to import (MPM)", hl: true, sl: true, def: "The fraction of additional income that is spent on imports." },
  { title: "Marginal propensity to save (MPS)", hl: true, sl: true, def: "The fraction of additional income that is saved (MPS = ΔS / ΔY)." },
  { title: "Marginal propensity to tax (MPT)", hl: true, sl: true, def: "The fraction of additional income taken in taxation." },
  { title: "Marginal revenue", hl: true, sl: true, def: "The additional revenue gained from selling one more unit of output (MR = ΔTR / ΔQ)." },
  { title: "Market equilibrium", hl: true, sl: true, def: "The price and quantity at which the quantity demanded equals quantity supplied, so there is no tendency for the price to change." },
  { title: "Market failure", hl: true, sl: true, def: "A situation in which the free market fails to allocate resources efficiently, leading to a misallocation of resources." },
  { title: "Market power", hl: true, sl: true, def: "The ability of a firm to influence the market price of a good or service." },
  { title: "Merit good", hl: true, sl: true, def: "A good that has positive externalities and is under-consumed if left to the free market. Governments may subsidise or provide merit goods." },
  { title: "Microfinance", hl: true, sl: false, def: "The provision of small loans and other financial services to low-income individuals or small businesses that lack access to conventional banking services." },
  { title: "Minimum wage", hl: true, sl: true, def: "A legally set minimum price for labour, set above the equilibrium wage, intended to raise incomes for lower-paid workers." },
  { title: "Mixed economy", hl: true, sl: true, def: "An economy that combines elements of both market and planned (command) economies, with some resources allocated by the market and others by government." },
  { title: "Monetary policy", hl: true, sl: true, def: "The use of interest rates and the money supply by the central bank to influence aggregate demand and achieve macroeconomic objectives." },
  { title: "Monopolistic competition", hl: true, sl: true, def: "A market structure with many firms selling differentiated products. Firms have some market power but there is freedom of entry and exit." },
  { title: "Monopoly", hl: true, sl: true, def: "A market structure dominated by a single firm that has significant market power and faces no direct competition." },
  { title: "Monopsony", hl: true, sl: false, def: "A market in which there is only one buyer of a good or service, giving that buyer significant market power over suppliers." },
  { title: "Multilateral aid", hl: true, sl: true, def: "Aid channelled through international organisations such as the World Bank, IMF or UN agencies." },
  { title: "Multiplier effect", hl: true, sl: true, def: "The process by which an initial change in spending leads to a larger change in national income through successive rounds of spending." },
  { title: "Nash equilibrium", hl: true, sl: false, def: "An outcome in a game where no player has an incentive to change their strategy given the strategies of the other players." },
  { title: "Natural monopoly", hl: true, sl: true, def: "An industry where it is most efficient for one firm to supply the entire market due to very high fixed costs and economies of scale." },
  { title: "Natural rate of unemployment", hl: true, sl: true, def: "The rate of unemployment that exists when the labour market is in equilibrium, consisting of structural and frictional unemployment." },
  { title: "Negative externality", hl: true, sl: true, def: "A cost imposed on third parties not involved in a transaction. The social cost exceeds the private cost." },
  { title: "Net exports", hl: true, sl: true, def: "The value of a country's exports minus its imports (X – M)." },
  { title: "Nominal GDP", hl: true, sl: true, def: "The total value of goods and services produced in an economy measured at current prices, unadjusted for inflation." },
  { title: "Non-price competition", hl: true, sl: true, def: "Competition between firms using methods other than price, such as advertising, product differentiation, customer service, or brand loyalty." },
  { title: "Normal good", hl: true, sl: true, def: "A good for which demand increases as consumer income rises (positive income elasticity of demand)." },
  { title: "Normal profit", hl: true, sl: true, def: "The minimum level of profit required to keep a firm in the industry in the long run. It is when total revenue equals total cost (including opportunity cost)." },
  { title: "Official development assistance (ODA)", hl: true, sl: true, def: "Aid from governments to developing countries provided at concessional terms to promote economic development and welfare." },
  { title: "Oligopoly", hl: true, sl: true, def: "A market structure dominated by a small number of large firms that are interdependent and may collude or compete." },
  { title: "Opportunity cost", hl: true, sl: true, def: "The value of the next best alternative forgone when a choice is made." },
  { title: "Output approach", hl: true, sl: true, def: "A method of calculating GDP by summing the value added by all industries in the economy." },
  { title: "Overvalued currency", hl: true, sl: true, def: "When a currency's exchange rate is set above its equilibrium value, making exports more expensive and imports cheaper." },
  { title: "Perfect competition", hl: true, sl: true, def: "A market structure characterised by many buyers and sellers, homogeneous products, freedom of entry and exit, and perfect information." },
  { title: "Phillips curve", hl: true, sl: true, def: "A relationship showing the short-run trade-off between inflation and unemployment: as unemployment falls, inflation tends to rise." },
  { title: "Positive externality", hl: true, sl: true, def: "A benefit received by third parties not involved in a transaction. The social benefit exceeds the private benefit." },
  { title: "Potential output", hl: true, sl: true, def: "The maximum level of real output an economy can produce when all resources are fully and efficiently employed." },
  { title: "Price ceiling", hl: true, sl: true, def: "A maximum price set by the government below the equilibrium price, leading to excess demand (shortage)." },
  { title: "Price discrimination", hl: true, sl: true, def: "When a firm charges different prices to different consumers for the same product, based on their willingness to pay." },
  { title: "Price elasticity of demand (PED)", hl: true, sl: true, def: "A measure of the responsiveness of quantity demanded to a change in price. PED = % change in Qd / % change in price." },
  { title: "Price elasticity of supply (PES)", hl: true, sl: true, def: "A measure of the responsiveness of quantity supplied to a change in price. PES = % change in Qs / % change in price." },
  { title: "Price floor", hl: true, sl: true, def: "A minimum price set by the government above the equilibrium price, leading to excess supply (surplus)." },
  { title: "Price leadership", hl: true, sl: false, def: "A form of tacit collusion in an oligopoly where one dominant firm sets the price and others follow." },
  { title: "Price maker", hl: true, sl: true, def: "A firm with sufficient market power to set its own price, rather than being forced to accept the market price." },
  { title: "Price taker", hl: true, sl: true, def: "A firm that must accept the market price as determined by supply and demand. In perfect competition, all firms are price takers." },
  { title: "Privatisation", hl: true, sl: true, def: "The transfer of ownership of a business, industry or service from the public (government) sector to the private sector." },
  { title: "Producer surplus", hl: true, sl: true, def: "The difference between the price producers receive for a good and the minimum price they would be willing to accept. It is the area above the supply curve and below the market price." },
  { title: "Production possibility curve (PPC)", hl: true, sl: true, def: "A graph showing the maximum combinations of two goods that can be produced in an economy, given its resources and technology." },
  { title: "Progressive tax", hl: true, sl: true, def: "A tax where the rate increases as taxable income increases, taking a higher percentage from higher earners." },
  { title: "Protectionism", hl: true, sl: true, def: "Government policies that restrict international trade to protect domestic industries from foreign competition." },
  { title: "Public good", hl: true, sl: true, def: "A good that is non-excludable and non-rival in consumption, such as national defence or street lighting." },
  { title: "Quantitative easing (QE)", hl: true, sl: false, def: "A form of unconventional monetary policy where the central bank creates new money to purchase financial assets, increasing the money supply to stimulate the economy." },
  { title: "Quota", hl: true, sl: true, def: "A limit on the quantity of a good that can be imported into a country." },
  { title: "Real GDP", hl: true, sl: true, def: "GDP adjusted for inflation, allowing comparisons of output over time at constant prices." },
  { title: "Real GDP per capita", hl: true, sl: true, def: "Real GDP divided by the total population, used as a measure of average living standards." },
  { title: "Recession", hl: true, sl: true, def: "A period of negative economic growth, typically defined as two consecutive quarters of falling real GDP." },
  { title: "Recessionary gap", hl: true, sl: true, def: "A situation where actual output is below the potential output of the economy, resulting in unemployment. Aggregate demand is insufficient." },
  { title: "Redistribution of income", hl: true, sl: true, def: "Policies that transfer income from wealthier to poorer individuals, such as progressive taxation and welfare payments." },
  { title: "Regressive tax", hl: true, sl: true, def: "A tax where the burden falls more heavily on lower-income individuals as a proportion of their income." },
  { title: "Relative poverty", hl: true, sl: true, def: "A measure of poverty relative to the living standards of the wider society, typically defined as income below a certain percentage of median income." },
  { title: "Remittances", hl: true, sl: true, def: "Money sent by migrant workers back to their home countries." },
  { title: "Revenue", hl: true, sl: true, def: "Total income received by a firm from the sale of its output (TR = P × Q)." },
  { title: "Short run", hl: true, sl: true, def: "A time period in which at least one factor of production is fixed and firms cannot enter or exit the market." },
  { title: "Short-run aggregate supply (SRAS)", hl: true, sl: true, def: "The total output that firms in an economy are willing and able to produce at each price level in the short run." },
  { title: "Soft peg", hl: true, sl: false, def: "A form of managed exchange rate where a currency is fixed to another within a band, with some flexibility for adjustment." },
  { title: "Stagflation", hl: true, sl: true, def: "A situation where high inflation and high unemployment occur simultaneously, often accompanied by slow economic growth." },
  { title: "Structural adjustment programmes (SAPs)", hl: true, sl: false, def: "Economic reform packages required by the IMF and World Bank in exchange for loans to developing countries, typically involving free market reforms." },
  { title: "Structural unemployment", hl: true, sl: true, def: "Unemployment caused by a mismatch between the skills of workers and the skills required by employers, often resulting from technological change or industrial decline." },
  { title: "Subsidy", hl: true, sl: true, def: "A payment by the government to producers to lower their costs of production and encourage greater output." },
  { title: "Substitute goods", hl: true, sl: true, def: "Goods that can be used in place of each other. An increase in the price of one good leads to an increase in demand for the substitute." },
  { title: "Supply-side policies", hl: true, sl: true, def: "Government policies that aim to increase the productive capacity of the economy by improving the efficiency or quantity of factors of production." },
  { title: "Sustainable development", hl: true, sl: true, def: "Development that meets the needs of the present without compromising the ability of future generations to meet their own needs." },
  { title: "Tariff", hl: true, sl: true, def: "A tax on imported goods, intended to raise their price and protect domestic producers from foreign competition." },
  { title: "Terms of trade", hl: true, sl: true, def: "The ratio of a country's export prices to its import prices. ToT = (Index of export prices / Index of import prices) × 100." },
  { title: "Total cost", hl: true, sl: true, def: "The sum of all fixed and variable costs at a given level of output (TC = TFC + TVC)." },
  { title: "Total revenue", hl: true, sl: true, def: "The total income received by a firm from selling its output (TR = P × Q)." },
  { title: "Trade creation", hl: true, sl: true, def: "A benefit of joining a customs union where trade shifts from a high-cost domestic producer to a lower-cost member country producer." },
  { title: "Trade diversion", hl: true, sl: true, def: "A cost of joining a customs union where trade shifts away from a low-cost non-member country to a higher-cost member country due to the common external tariff." },
  { title: "Trade liberalisation", hl: true, sl: true, def: "The reduction or elimination of trade barriers to encourage free trade between countries." },
  { title: "Transfer payments", hl: true, sl: true, def: "Payments made by the government to individuals for which no good or service is provided in return, such as welfare benefits or pensions." },
  { title: "Undervalued currency", hl: true, sl: true, def: "When a currency's exchange rate is set below its equilibrium value, making exports cheaper and imports more expensive." },
  { title: "Unemployment", hl: true, sl: true, def: "A situation where individuals who are actively seeking work at the prevailing wage rate are unable to find employment." },
  { title: "Unemployment rate", hl: true, sl: true, def: "The percentage of the labour force that is unemployed and actively seeking work." },
  { title: "Value added", hl: true, sl: true, def: "The difference between the value of a firm's output and the cost of its intermediate inputs." },
  { title: "Variable costs", hl: true, sl: true, def: "Costs that change with the level of output, such as raw materials and direct labour." },
  { title: "Welfare payments", hl: true, sl: true, def: "Government transfer payments to individuals to support their standard of living, such as unemployment benefits or housing support." },
  { title: "World Trade Organization (WTO)", hl: true, sl: true, def: "An international organisation that sets and enforces rules for international trade, aiming to reduce trade barriers and resolve disputes." },
  { title: "X-inefficiency", hl: true, sl: false, def: "When a firm fails to minimise costs due to a lack of competitive pressure, resulting in productive inefficiency." }
];

const suggestions = ["Phillips Curve", "Externalities", "PED", "GDP", "Monopoly", "Inflation", "Subsidy", "Nash Equilibrium", "Lorenz Curve"];

function renderChips() {
  const c = document.getElementById('chips');
  c.innerHTML = suggestions.map(s => `<button class="chip" onclick="search('${s}')">${s}</button>`).join('');
}

function search(q) {
  document.getElementById('searchInput').value = q;
  doSearch(q);
}

function doSearch(q) {
  const query = q.trim().toLowerCase();
  const cards = document.getElementById('cards');
  const meta = document.getElementById('resultsMeta');

  if (!query) {
    cards.innerHTML = '';
    meta.textContent = '';
    return;
  }

  const results = terms.filter(t =>
    t.title.toLowerCase().includes(query) ||
    t.def.toLowerCase().includes(query)
  );

  meta.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`;

  if (results.length === 0) {
    cards.innerHTML = `<div class="empty">No terms found for "<strong>${q}</strong>"</div>`;
    return;
  }

  cards.innerHTML = results.map(t => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${t.title}</div>
        <div class="badges">
          ${t.hl ? '<span class="badge badge-hl">HL</span>' : ''}
          ${t.sl ? '<span class="badge badge-sl">SL</span>' : ''}
        </div>
      </div>
      <div class="card-def">${t.def}</div>
    </div>
  `).join('');
}

document.getElementById('searchInput').addEventListener('input', e => doSearch(e.target.value));
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.classList.contains('soon')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isEcon = tab.dataset.tab === 'econ';
    document.getElementById('econTab').style.display = isEcon ? '' : 'none';
    document.getElementById('otherTab').style.display = isEcon ? 'none' : '';
  });
});

renderChips();
</script>
</body>
</html>
