<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111;
      --border: #222222; --text: #f0f0f0; --muted: #666666;
      --accent: #f0f0f0;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    header {
      padding: 3rem 2rem 0;
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 0.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      margin: 2rem auto 0;
      max-width: 860px;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.02em;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
    .tab.soon { opacity: 0.3; cursor: default; }

    .search-wrap { max-width: 860px; margin: 2rem auto 0; padding: 0 2rem; }
    .search-box { position: relative; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 1rem; color: var(--muted); font-size: 1rem; pointer-events: none; }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #333; }
    .search-input::placeholder { color: var(--muted); }

    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .chip {
      padding: 0.35rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .chip:hover { color: var(--text); border-color: #333; }

    .results-wrap { max-width: 860px; margin: 1.5rem auto 4rem; padding: 0 2rem; }
    .results-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; letter-spacing: 0.03em; }
    .cards { display: grid; gap: 0.75rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.4rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #2a2a2a; }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 0.6rem;
    }
    .card-def { font-size: 0.875rem; color: #aaaaaa; line-height: 1.6; font-weight: 300; }

    .empty { text-align: center; padding: 4rem 0; color: var(--muted); font-size: 0.9rem; }
    .coming-soon { text-align: center; padding: 5rem 0; color: var(--muted); }
    .coming-soon h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: #333; margin-bottom: 0.5rem; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">IBVault</div>
  <div class="subtitle">IB subjects definitions, concepts and diagrams</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="econ">Economics</button>
  <button class="tab" data-tab="bio">Biology</button>
  <button class="tab soon">History</button>
  <button class="tab soon">Chemistry</button>
  <button class="tab soon">Psychology</button>
</div>

<div id="tab-econ" class="tab-panel active">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="econSearch" placeholder="Search economics terms, concepts…" autocomplete="off">
    </div>
    <div class="chips" id="econChips"></div>
  </div>
  <div class="results-wrap">
    <div class="results-meta" id="econMeta"></div>
    <div class="cards" id="econCards"></div>
  </div>
</div>

<div id="tab-bio" class="tab-panel">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="bioSearch" placeholder="Search biology terms, concepts…" autocomplete="off">
    </div>
    <div class="chips" id="bioChips"></div>
  </div>
  <div class="results-wrap">
    <div class="results-meta" id="bioMeta"></div>
    <div class="cards" id="bioCards"></div>
  </div>
</div>

<div id="tab-soon" class="tab-panel coming-soon">
  <h2>Coming soon</h2>
  <p>This subject is on the way.</p>
</div>

<script>
const econTerms = [
  { title: "Abnormal profit", def: "When a firm's average revenue is greater than its average costs." },
  { title: "Absolute Advantage", def: "The ability to produce the same quantity of a good or service using fewer resources per unit of time." },
  { title: "Absolute poverty", def: "The inability to afford the basic goods and services required to meet essential needs, when measured in relation to a fixed poverty line that indicates the minimum income required to cover basic necessities." },
  { title: "Administrative Barriers", def: "Bureaucratic rules and regulations imposed by governments to restrict imports and protect domestic industries." },
  { title: "Adverse selection", def: "When one of the sides has more knowledge about the quality of the product sold than the other." },
  { title: "Aggregate demand", def: "The total quantity of real output that all buyers in an economy (consumers, businesses, the government, and foreigners) are willing to purchase over a specific time period, at all possible price levels, ceteris paribus." },
  { title: "Aggregate supply", def: "The total output produced in an economy at all possible price levels, over a specific time period, ceteris paribus." },
  { title: "Allocative Efficiency", def: "State of the economy in which the combination and quantity of goods and services produced is aligned with the preferences of consumers and producers, maximising social surplus." },
  { title: "Appreciation", def: "An increase in the value of a currency." },
  { title: "Asymmetric Information", def: "Refers to a situation where buyers and sellers don't have the same access to information." },
  { title: "Automatic Stabilizers", def: "Factors without government interaction which automatically reduce the short-term business cycle fluctuations." },
  { title: "Average tax rate", def: "The average total proportion of income paid as tax." },
  { title: "Balance of Payments", def: "A statement or record of a country's economic transactions with all other countries over a specific time period (often a year)." },
  { title: "Behavioural economics", def: "A field of economics founded on the notion that human behaviour is significantly more complex than the traditional assumptions of rational consumer choice." },
  { title: "Bond", def: "A signed certificate representing a loan given by the bond holder to the borrower in exchange for regular interest payments and the promise to repay the full amount at a set future date." },
  { title: "Business cycle", def: "Fluctuations in the growth of real output, characterised by alternating phases of expansion (rising real output) and contraction (falling real output)." },
  { title: "Capital", def: "Human-made factors of production used to produce goods and services." },
  { title: "Capital Account", def: "The sum of the balance of capital transfers and transactions in non-produced, non-financial assets." },
  { title: "Capital flight", def: "The large-scale and rapid movement of financial assets or capital from a country to foreign markets, often due to economic instability, political uncertainty, or fear of currency depreciation." },
  { title: "Carbon Tax", def: "A tax which is imposed per unit of carbon emitted." },
  { title: "Ceteris paribus", def: "A Latin expression indicating all other variables besides those being considered are assumed to be unchanging." },
  { title: "Choice Architecture", def: "The way in which options are showcased to decision-makers, with emphasis on the design and environment to influence decisions." },
  { title: "Circular flow of income", def: "An income flow in an economy where the value of the output produced is equivalent to the total income earned from its production, which is also equivalent to the expenditures spent on purchasing that output." },
  { title: "Collective self-governance", def: "The situation where common pool resources are given to the control of individuals for them to manage sustainably." },
  { title: "Common Markets", def: "A form of trading bloc that builds on a customs union by allowing the free movement of goods, services, and factors of production among member countries." },
  { title: "Common Pool Resources", def: "Natural resources which are available for use by everyone, but are susceptible to overuse and depletion." },
  { title: "Comparative Advantage", def: "A country having lower opportunity costs in the production of a good compared to another country." },
  { title: "Complementary goods", def: "Goods that tend to be used together." },
  { title: "Composite Indicator", def: "A single measure that combines multiple individual indicators into one index to provide an overall assessment." },
  { title: "Concentration Ratio", def: "Measures the market share controlled by the larger firms in the market." },
  { title: "Consumer Price Index (CPI)", def: "A measure of the cost of living carried out by comparing the value of a basket of goods and services in a given year to a base year." },
  { title: "Consumer surplus", def: "The difference between the highest price consumers are willing and able to pay for a good or service and the actual price they end up paying." },
  { title: "Contractionary Fiscal Policy", def: "Fiscal policy aimed at reducing aggregate demand by decreasing government spending or increasing taxes." },
  { title: "Cost-push inflation", def: "A type of inflation caused by rising production costs, such as higher wages or input prices, which reduce aggregate supply and push the price level up." },
  { title: "Credit Rating", def: "Determined by international agencies, ranking countries by how probable they are to repay their loans completely and on time." },
  { title: "Current Account", def: "The sum of the balance of trade in goods and services, income and current transfers." },
  { title: "Customs Union", def: "A type of trading bloc that meets all the criteria of a free trade area but also adopts a common policy towards non-member countries." },
  { title: "Cyclical unemployment", def: "Unemployment that occurs during economic downturns when demand for goods and services falls, leading to job losses." },
  { title: "Debt relief", def: "Partial or total cancellation, restructuring, or reduction of a country's debt obligations to help alleviate financial burdens and support economic recovery." },
  { title: "Deflation", def: "A sustained decrease in the general price level of goods and services in an economy over time, typically indicated by a negative inflation rate." },
  { title: "Demand", def: "Various quantities of a good or service that consumers are willing and able to buy at different possible prices during a particular time period, ceteris paribus." },
  { title: "Demand-pull inflation", def: "A type of inflation caused by an increase in aggregate demand that exceeds aggregate supply at the full employment level." },
  { title: "Demerit Good", def: "Goods that are not socially desirable but are over-provided by the market." },
  { title: "Depreciation", def: "A decrease in the value of a currency." },
  { title: "Direct provision of services", def: "When the government directly delivers goods or services to the public." },
  { title: "Direct tax", def: "Tax paid to the government directly by the taxpayer." },
  { title: "Disinflation", def: "A slowdown in the rate of inflation, meaning prices are still rising but at a slower pace compared to previous periods." },
  { title: "Diversification", def: "The process of expanding the range of products, services, or markets to reduce risk and enhance economic stability." },
  { title: "Dumping", def: "The sale of goods and services in international markets at a price lower than the cost of production." },
  { title: "Economic development", def: "The process of increasing real per capita income while improving living standards and reducing poverty within an economy as a whole." },
  { title: "Economic Diversification", def: "Shift of the economy from fewer to a larger number of income sources." },
  { title: "Economic growth", def: "An increase in a country's real output (real GDP) over a period of time." },
  { title: "Economic inequality", def: "The degree of differences between an economy's individuals in their ability to satisfy their needs and wants due to monetary constraints." },
  { title: "Economic Integration", def: "Cooperation and coordination between countries and their economic policies, to make them more economically interconnected." },
  { title: "Economics", def: "The study of choices leading to the best possible use of scarce resources in order to best satisfy unlimited human needs and wants." },
  { title: "Economies of scale", def: "Reductions in average production costs that arise when a firm increases its output by scaling up all its inputs in the long run." },
  { title: "Efficiency", def: "Using scarce resources in the best possible way to avoid welfare loss." },
  { title: "Entrepreneurship", def: "The unique human skills held by some individuals, including the ability to innovate, take business risks, and pursue new opportunities for running a business." },
  { title: "Equity", def: "The condition of being fair and just in resource distribution." },
  { title: "Exchange Rate", def: "The value of one currency in terms of another currency." },
  { title: "Expansionary Fiscal Policy", def: "Fiscal policy aimed at increasing aggregate demand by increasing government spending and/or reducing taxes." },
  { title: "Expenditure reducing policies", def: "Policies that aim to reduce overall spending in the economy, including spending on imports." },
  { title: "Expenditure switching policies", def: "Policies that aim to switch spending from imports to domestic goods and services." },
  { title: "Externality", def: "The spillover effects on third parties due to actions of consumers or producers." },
  { title: "Factors of production", def: "All resources or inputs used to produce goods and services." },
  { title: "Financial Account", def: "The sum of foreign direct investment (FDI), portfolio investment, reserve assets and official borrowing." },
  { title: "Fiscal Policy", def: "The use of government spending and taxation to influence aggregate demand." },
  { title: "Fixed Exchange Rate", def: "A system where the central bank maintains the currency's value at a predetermined level rather than letting market forces decide it." },
  { title: "Floating Exchange Rate", def: "A system in which the value of a currency is determined by supply and demand, without government intervention." },
  { title: "Foreign aid", def: "Provision of financial assistance, goods, and services to developing countries, with the primary purpose of improving their economic, social, and political conditions." },
  { title: "Foreign Direct Investment", def: "An investment by a foreigner into another country, where the investor buys at least 10% of a business." },
  { title: "Free Trade", def: "An absence of government intervention in international trade, resulting in no restrictions on imports and exports." },
  { title: "Free Trade Area", def: "A group of countries that agree to gradually remove trade restrictions among themselves." },
  { title: "Frictional unemployment", def: "Unemployment that occurs when people are temporarily between jobs or entering the workforce for the first time." },
  { title: "Gini coefficient", def: "A numerical measure of income or wealth inequality on an index from 0 (perfect equality) to 1 (perfect inequality)." },
  { title: "Government intervention", def: "When a government alters the resource allocation that markets would have achieved working freely on their own." },
  { title: "Gross Domestic Product (GDP)", def: "The market value of all final goods and services produced in an economy over a period of time (usually a year)." },
  { title: "Gross National Income (GNI)", def: "The total income earned by an economy's residents over a specific time period, equal to the market value of all final goods and services produced by the factors of production supplied by the economy's residents." },
  { title: "Human capital", def: "Skills, abilities, good health, and knowledge utilized by people to increase their productivity." },
  { title: "Humanitarian aid", def: "Provision of resources and emergency assistance to people affected by natural disasters, conflicts, or crises, with the immediate aim of saving lives and alleviating suffering." },
  { title: "Income Elasticity of Demand", def: "A measure of the responsiveness of demand to changes in income." },
  { title: "Indirect taxes", def: "Taxes imposed on goods and services, paid to the government by sellers but ultimately borne by consumers." },
  { title: "Inequality of opportunities", def: "Differences in life opportunities due to factors beyond an individual's control." },
  { title: "Infant Industry", def: "A new domestic industry that has not had the time to achieve production efficiencies and establish itself yet." },
  { title: "Inferior goods", def: "A good whose demand decreases as consumer income increases." },
  { title: "Inflation Targeting", def: "A strategy where central banks set a specific inflation rate as their primary goal and adjust monetary policies to meet it." },
  { title: "Inflationary gap", def: "A situation where the actual real output of an economy is above its full-employment level, resulting in unemployment being lower than the natural rate." },
  { title: "Informal economy", def: "Part of the economy that lies outside the formal economy, involving economic activities that are unregistered and legally unregulated." },
  { title: "Injections", def: "The addition of funds into the income flow through investment, government spending, or exports." },
  { title: "Institutions", def: "The formal and informal rules, laws, and systems that structure economic, political, and social interactions, influencing decision-making and resource allocation." },
  { title: "Interdependence", def: "The concept that economic decision-makers rely on and interact with one another, because no one can be entirely self-sufficient." },
  { title: "Interest rates", def: "The proportion of the amount of money borrowed charged as interest, expressed as a percentage." },
  { title: "International Trade", def: "The exchange of goods and services between two or more countries." },
  { title: "Keynesian Multiplier", def: "The proportional increase in real GDP that results from an initial injection into the economy." },
  { title: "Labour", def: "All the physical work and mental skills that humans put into the production of goods and services." },
  { title: "Land", def: "All natural resources on Earth, including farmland and non-farmland." },
  { title: "Law of Diminishing Marginal Returns", def: "As additional units of a variable input are added to fixed inputs, the marginal product increases by less and less each time, eventually decreasing." },
  { title: "Law of Diminishing Marginal Utility", def: "As more of a good is consumed, the additional satisfaction gained from each extra unit decreases." },
  { title: "Law of Supply", def: "There is a direct, positive relationship between price and quantity supplied." },
  { title: "Leakages", def: "The removal of funds from the income flow, represented by savings, taxes, or imports." },
  { title: "Lorenz curve", def: "A graphical representation of income inequality within an economy." },
  { title: "Macroeconomic equilibrium", def: "The point where aggregate demand intersects aggregate supply, establishing the price level and real output of an economy." },
  { title: "Macroeconomic objectives", def: "Key goals of governments in achieving economic stability: sustainable growth, low inflation, low unemployment, balanced trade, and income equality." },
  { title: "Macroeconomics", def: "The branch of economics that analyzes the economy as a whole by using aggregates." },
  { title: "Managed Exchange Rate", def: "A system where the exchange rate is mainly determined by market forces, but the central bank occasionally intervenes to keep it close to a desired level." },
  { title: "Marginal Benefit", def: "The benefit gained from consuming an additional unit of a good or service." },
  { title: "Marginal Cost", def: "The cost of producing an additional unit of output." },
  { title: "Marginal tax rate", def: "The percentage of tax paid on the next dollar earned." },
  { title: "Marginal utility", def: "The satisfaction obtained from consuming one more unit of a good or service." },
  { title: "Market", def: "Any arrangement that connects buyers and sellers, enabling them to carry out an exchange." },
  { title: "Market Equilibrium", def: "When quantity demanded is equal to quantity supplied, and there is no tendency for the price to change." },

  { title: "Market power", def: "The degree to which a firm in a market is able to control its output price." },
  { title: "Marshall-Lerner Condition", def: "A condition which determines whether a depreciation or devaluation of a currency will improve a current account deficit." },
  { title: "Merit Good", def: "Goods that are desirable by society but are under-provided by the market." },
  { title: "Microeconomics", def: "The branch of economics that studies the behaviour of consumers and firms in making decisions regarding resource allocation." },
  { title: "Monetary Policy", def: "Adjustments of interest rates and the availability of money in the economy set by the central bank." },
  { title: "Monetary Union", def: "A common market between countries who also share a common currency and a common central bank." },
  { title: "Money Multiplier", def: "A concept that quantifies the total amount of money created in the economy from an initial deposit." },
  { title: "Monopoly", def: "A market structure with one single dominant firm that has substantial control over output prices, selling a unique product protected by high barriers to entry." },
  { title: "Moral Hazard", def: "A situation where one party takes a risk but is not responsible for covering all of the costs because they are covered by the other party." },

  { title: "Nash Equilibrium", def: "A situation where none of the players can improve their position by making another choice." },
  { title: "National income", def: "The total income of an economy, composed of the sum of wages, interest, rent and profit." },

  { title: "Karyotype", def: "The complete set of an organism chromosomes, described by number, size, shape, and banding pattern." },
  { title: "Krebs cycle", def: "Also known as the citric acid cycle, occurs in the mitochondrial matrix and is a key part of aerobic respiration." },
  { title: "Leaching", def: "The loss of water-soluble plant nutrients from the soil due to rain and irrigation." },
  { title: "Ligaments", def: "Strong, fibrous bands of connective tissue linking bone to bone." },
  { title: "Ligand", def: "A molecule that binds to a specific site on a receptor protein." },
  { title: "Ligase", def: "An enzyme that joins Okazaki fragments on the lagging strand during DNA replication." },
  { title: "Lignin", def: "A complex, strong polymer deposited in the walls of xylem vessels." },
  { title: "Limiting factor", def: "Any abiotic or biotic variable that restricts a species growth, reproduction, or distribution if it goes beyond the species tolerance range." },
  { title: "Locus", def: "A gene exact location on a chromosome, acting as an address for finding and studying genes." },
  { title: "Loop of Henle", def: "A U-shaped tube in the nephron responsible for creating a concentration gradient in the medulla, enabling the production of concentrated urine." },
  { title: "LUCA", def: "The last universal common ancestor of all present-day organisms, representing the root of the tree of life." },
  { title: "Luteinizing Hormone (LH)", def: "A hormone that triggers ovulation and supports the formation of the corpus luteum." },
  { title: "Lymphatic system", def: "A network of vessels, tissues, and organs that drain excess tissue fluid and return it to the blood, while aiding immune function." },
  { title: "Lymphocyte", def: "A type of white blood cell critical for the adaptive immune response." },
  { title: "Lysosome", def: "Specialized vesicles containing digestive enzymes that break down waste materials and cellular debris." },
  { title: "Medulla Oblongata", def: "Part of the brainstem responsible for regulating involuntary functions, including heart rate, blood pressure, and respiration." },
  { title: "Meiosis", def: "A type of cell division that reduces the chromosome number by half, producing four genetically distinct haploid cells, essential for sexual reproduction." },
  { title: "Melatonin", def: "A hormone secreted by the pineal gland that regulates sleep-wake cycles." },
  { title: "Membrane potential", def: "The difference in electrical charge between the inside and outside of a cell." },
  { title: "Metabolism", def: "The sum of all chemical reactions occurring in an organism to maintain life, including catabolism (breakdown) and anabolism (building)." },
  { title: "Microplastics", def: "Plastic fragments smaller than 5 mm in size." },
  { title: "Mitochondria", def: "Double-membrane-bound organelles responsible for producing ATP through aerobic respiration." },
  { title: "Mitosis", def: "A type of cell division in which a single parent cell divides to produce two genetically identical daughter cells." },
  { title: "Mitotic index", def: "The ratio of the number of cells in mitosis to the total number of cells observed." },
  { title: "Mixotroph", def: "Organisms that can obtain energy and carbon through both autotrophic and heterotrophic modes of nutrition." },
  { title: "Molecular Clock", def: "The use of the gradual accumulation of mutations to infer when species diverged from a common ancestor." },
  { title: "Monoclonal antibodies", def: "Lab-engineered antibodies designed to bind to a specific target." },
  { title: "Motor neurons", def: "Cells that carry instructions from the brain to the muscles." },
  { title: "Multicellularity", def: "Organisms composed of multiple cells functioning together as a single unit." },
  { title: "Mutation", def: "A change in the DNA sequence that can alter the instructions for building proteins or regulating cellular processes." },
  { title: "Mutualism", def: "A cooperative relationship where both species gain benefits." },
  { title: "Myelin", def: "A fatty substance that wraps around the axons of neurons, forming an insulating layer that speeds up signal transmission." },
  { title: "Natural selection", def: "The process where individuals with traits better suited to their environment have higher reproductive success, passing these traits to the next generation." },
  { title: "Negative feedback loop", def: "A self-regulating system that detects changes in a variable and triggers responses to bring it back to a set point." },
  { title: "Neurotransmitter", def: "Chemical signals used by neurons to communicate across synapses." },
  { title: "Non-Disjunction", def: "The failure of homologous chromosomes or sister chromatids to separate properly during meiosis." },
  { title: "Nucleosome", def: "The basic structural unit of chromatin, consisting of DNA wrapped around a core of histone proteins." },
  { title: "Nucleus", def: "A double-membrane-bound organelle containing the cell DNA." },
  { title: "Obligate aerobes", def: "Organisms that depend on oxygen for aerobic respiration to efficiently generate ATP." },
  { title: "Obligate Anaerobes", def: "Organisms that find oxygen toxic and thrive in oxygen-free environments." },
  { title: "Oestradiol", def: "A form of estrogen that promotes the growth of the uterine lining and regulates FSH and LH via feedback loops." },
  { title: "Open system", def: "A system that exchanges both energy and matter with its surroundings." },
  { title: "Organelles", def: "Structures inside cells that perform specific jobs to keep the cell alive." },
  { title: "Osmoregulation", def: "The process of maintaining the balance of water and solutes in the body." },
  { title: "Osmosis", def: "The passive movement of water molecules across a semi-permeable membrane from a region of lower solute concentration to higher solute concentration." },
  { title: "Pacemaker", def: "A group of cells in the right atrium that regulates the heartbeat by initiating electrical impulses." },
  { title: "Parasitism", def: "A relationship where one species (the parasite) benefits at the expense of another (the host)." },
  { title: "Parthenogenesis", def: "A form of asexual reproduction where an egg develops into an individual without fertilization." },
  { title: "Pathogen", def: "Any organism or agent capable of causing disease." },
  { title: "PCR (Polymerase Chain Reaction)", def: "A technique that amplifies DNA, creating millions of copies of a specific DNA sequence in just a few hours." },
  { title: "Pedigree charts", def: "Family tree diagrams that track the inheritance of traits across generations." },
  { title: "Peptide bond", def: "A covalent bond formed between the carboxyl group of one amino acid and the amino group of another." },
  { title: "Peristalsis", def: "A wave-like contraction of smooth muscles that pushes food through the digestive tract." },
  { title: "Permafrost", def: "Ground that remains frozen for two or more consecutive years, typically found in polar regions." },
  { title: "Phagocytosis", def: "The process by which phagocytes engulf and digest pathogens." },
  { title: "Phenotype", def: "The observable traits or characteristics of an organism, resulting from the interaction between its genotype and the environment." },
  { title: "Phenotypic plasticity", def: "The ability of an organism to alter its phenotype in response to environmental changes." },
  { title: "Phosphorylation", def: "The addition of a phosphate group to a molecule." },
  { title: "Photolysis", def: "The process of using light energy to split water molecules into oxygen, protons, and electrons." },
  { title: "Photosynthesis", def: "The process by which plants, algae, and some bacteria convert light energy from the sun into chemical energy stored as organic compounds like glucose." },
  { title: "Photosynthetic pigments", def: "Specialized molecules that absorb light energy and convert it into chemical energy during photosynthesis." },
  { title: "Photosystem", def: "A pigment-protein complex that absorbs light energy and transfers it to a reaction center, exciting electrons for photosynthesis." },
  { title: "Phototropism", def: "The growth response of a plant towards or away from light." },
  { title: "Phytohormones", def: "Signalling chemicals that regulate growth, development, and responses to environmental stimuli in plants." },
  { title: "Pituitary Gland", def: "A small gland at the base of the brain that secretes hormones controlling other endocrine glands." },
  { title: "Placenta", def: "A temporary organ that forms during pregnancy, connecting the foetus to the uterine wall and acting as a bridge for substance exchange between mother and baby." },
  { title: "Plasma membrane", def: "The thin, flexible boundary surrounding a cell, composed of a phospholipid bilayer with embedded proteins, cholesterol, and carbohydrates." },
  { title: "Plasmodesmata", def: "Microscopic channels that connect plant cells, allowing substances to move between them." },
  { title: "Plasmolysis", def: "The process where the cell membrane pulls away from the cell wall due to water loss." },
  { title: "Pluripotent stem cells", def: "Stem cells that can differentiate into any cell type of the embryo (all three germ layers) but cannot form extra-embryonic tissues." },
  { title: "Pneumocytes", def: "Specialized cells that line the alveoli in the lungs, responsible for exchanging oxygen and carbon dioxide." },
  { title: "Pollination", def: "The transfer of pollen from the anther to the stigma, a critical step preceding fertilization." },
  { title: "Polyploidy", def: "The duplication of an organism entire chromosome set." },
  { title: "Population", def: "A group of individuals of the same species living in a specific area, forming the building blocks of ecosystems." },
  { title: "Positive feedback loop", def: "A process where an initial change causes further changes that amplify the original effect, making it stronger and self-reinforcing." },
  { title: "Primary production", def: "The synthesis of organic carbon compounds from CO2 by autotrophs using external energy sources like sunlight." },
  { title: "Primary structure", def: "The linear sequence of amino acids in a protein polypeptide chain." },
  { title: "Primary succession", def: "The process by which life gradually colonizes and transforms a previously uninhabitable area." },
  { title: "Primase", def: "An enzyme that synthesizes a short RNA primer to provide a starting point for DNA polymerase during replication." },
  { title: "Progesterone", def: "A hormone that maintains the endometrium, preparing it for implantation, and inhibits FSH and LH to prevent new follicle development." },
  { title: "Prokaryote", def: "A single-celled organism lacking a nucleus and membrane-bound organelles, with genetic material in a single circular DNA molecule." },
  { title: "Promoter", def: "A specific DNA sequence near the start of a gene that acts as a binding site for RNA polymerase to initiate transcription." },
  { title: "Proteome", def: "The complete set of proteins produced by a cell, tissue, or organism at a specific time." },
  { title: "Realized niche", def: "The true extent of a species presence and activity in an ecosystem, limited by biotic factors like competition." },
  { title: "Receptor", def: "A protein that detects and responds to specific signals by binding to signalling molecules (ligands) to initiate a cellular response." },
  { title: "Reflex Arc", def: "A neural pathway that allows a rapid, automatic response to a stimulus without brain involvement." },
  { title: "Reproductive isolation", def: "Occurs when populations are prevented from interbreeding, creating separate gene pools and enabling independent evolution." },
  { title: "Rewilding", def: "The process of restoring ecosystems to their natural state by reducing human interference and reintroducing key species." },
  { title: "Ribozyme", def: "An RNA molecule capable of catalyzing specific biochemical reactions, similar to how protein enzymes function." },
  { title: "RNA (Ribonucleic Acid)", def: "A single-stranded nucleic acid that plays a key role in coding, decoding, regulation, and expression of genetic information." },
  { title: "RNA World Hypothesis", def: "A scientific theory suggesting that RNA served as both genetic material and catalyst before the evolution of DNA and proteins." },
  { title: "Root pressure", def: "A positive hydrostatic pressure in the roots that helps push water up the xylem when transpiration is low." },
  { title: "Rubisco", def: "An enzyme that catalyzes the fixation of carbon dioxide into organic molecules during photosynthesis." },
  { title: "Saltatory Conduction", def: "The process by which an action potential jumps from one node of Ranvier to the next, rather than traveling continuously along the axon." },
  { title: "Saprotrophic nutrition", def: "A mode of heterotrophic nutrition where organisms derive energy and nutrients by feeding on dead or decaying organic material." },
  { title: "Sarcomere", def: "The basic contractile unit of muscle fiber." },
  { title: "Secondary Immune response", def: "A faster and stronger immune response upon re-exposure to the same pathogen, mediated by memory cells." },
  { title: "Secondary production", def: "The accumulation of carbon compounds in biomass by animals and other heterotrophs." },
  { title: "Secondary structure of a protein", def: "Regular, repeating patterns that form when a polypeptide chain folds, such as alpha helices and beta sheets." },
  { title: "Seed dispersal", def: "The process by which seeds are transported away from the parent plant to new locations." },
  { title: "Segregation", def: "The process where the two alleles of a gene separate during gamete formation, ensuring each gamete receives only one allele." },
  { title: "Selective breeding", def: "The process by which humans intentionally breed animals or plants to enhance specific traits." },
  { title: "Semi-conservative replication", def: "When each new DNA molecule consists of one original (parental) strand and one newly synthesized strand." },
  { title: "Sensory neuron", def: "Specialized cells that transmit information from the environment to the central nervous system (CNS)." },
  { title: "Sexual reproduction", def: "Involves the fusion of male and female gametes, resulting in offspring with a unique combination of genes." },
  { title: "Sieve tube elements", def: "Specialized plant cells adapted for the translocation of sugars, characterized by sieve plates and dependence on companion cells." },
  { title: "Signal transduction", def: "The process by which cells respond to external signals, converting them into a cascade of chemical responses inside the cell." },
  { title: "Simple diffusion", def: "The passive movement of molecules from an area of higher concentration to lower concentration, without requiring energy." },
  { title: "Speciation", def: "The evolutionary process through which one species splits into two or more distinct species." },
  { title: "Species", def: "A group of organisms that share similar traits, interbreed, and are reproductively isolated." },
  { title: "Stabilizing selection", def: "Natural selection that favors intermediate phenotypes, reducing variation." },
  { title: "Stem cells", def: "Undifferentiated cells with the unique ability to divide endlessly and differentiate into various specialized cell types." },
  { title: "Stomata", def: "Small openings on the leaf surface that regulate gas exchange and water loss in plants." },
  { title: "Summation", def: "The process by which multiple signals from presynaptic neurons are combined at the postsynaptic neuron to determine if it will fire an action potential." },
  { title: "Surfactant", def: "A lipid-based substance that reduces surface tension in the alveoli, preventing them from collapsing after exhalation." },
  { title: "Sympatric speciation", def: "Speciation that occurs when populations in the same geographical area become reproductively isolated." },
  { title: "Synapse", def: "The point where two neurons meet or where a neuron meets an effector cell, where chemical signals are transmitted." },
  { title: "Systolic blood pressure", def: "The maximum pressure exerted on artery walls when the ventricles contract and blood is pushed into the arteries." },
  { title: "Tendons", def: "Fibrous connective tissue that attaches muscle to bone." },
  { title: "Tertiary structure", def: "The complete three-dimensional folding of a single polypeptide chain." },
  { title: "Hardy-Weinberg principle", def: "A mathematical model that predicts how allele and genotype frequencies remain constant in a population unless evolutionary forces act upon it." },
  { title: "Thermoregulation", def: "The process by which organisms maintain their core body temperature within a narrow range." },
  { title: "Threshold Potential", def: "The critical membrane potential that must be reached for an action potential to be initiated." },
  { title: "Thrombin", def: "An enzyme that converts fibrinogen to fibrin in the clotting process." },
  { title: "Tipping Point", def: "The critical threshold where a small change in conditions causes a dramatic shift in an ecosystem." },
  { title: "Totipotent Stem Cells", def: "The most potent stem cells, able to differentiate into any cell type including extra-embryonic tissues, and capable of forming an entire organism." },
  { title: "Transcription", def: "The process by which the genetic information encoded in a DNA sequence is copied into a complementary RNA sequence." },
  { title: "Transcription factors", def: "Proteins that control transcription by binding to specific DNA sequences." },
  { title: "Transcriptome", def: "The complete set of RNA molecules transcribed from the genome in a cell at a specific time." },
  { title: "Translation", def: "The synthesis of polypeptides from mRNA, where the base sequence of mRNA is converted into an amino acid sequence." },
  { title: "Transpiration", def: "The loss of water vapor from the aerial parts of a plant, primarily through stomata." },
  { title: "Trophic level", def: "A group of organisms that share the same position in a food chain, based on how they obtain energy." },
  { title: "Turgid", def: "A plant cell that is swollen with water, causing the cell membrane to press tightly against the cell wall." },
  { title: "Turgor Pressure", def: "The pressure exerted by the cell contents against the cell wall." },
  { title: "Vaccine", def: "Biological preparations containing antigens or nucleic acids from a pathogen to stimulate immunity." },
  { title: "Variation", def: "Differences in traits among individuals within a population, encompassing physical characteristics, behaviors, and genetic sequences." },
  { title: "Ventilation", def: "The process of moving air or water across the gas-exchange surface to refresh the supply of gases and maintain the concentration gradient." },
  { title: "Vesicles", def: "Small, membrane-bound sacs composed of a phospholipid bilayer that carry various substances within or between cells." },
  { title: "Vestigial structure", def: "A reduced anatomical feature that has lost its original function but is retained as an evolutionary remnant." },
  { title: "Virus", def: "A non-cellular particle composed of genetic material (DNA or RNA) enclosed in a protein coat called a capsid." },
  { title: "Water potential", def: "A measure of the potential energy of water per unit volume, determining the direction water will move." },
  { title: "Whole Genome Sequencing (WGS)", def: "A DNA sequencing technique that determines the order of all or most of an organism DNA bases." },
  { title: "Xylem", def: "Long, tube-like structures formed from dead plant cells that function as conduits for water and dissolved minerals from roots to leaves." },
  { title: "Zoonoses", def: "Infectious diseases that are naturally transmitted between animals and humans." },
  { title: "Zygote", def: "A eukaryotic cell formed by the fusion of two gametes." }
];

const econSuggestions = ["Scarcity", "Market Failure", "Externality", "Monopoly", "Inflation", "Subsidy", "Tariff", "GDP", "Opportunity cost"];
const bioSuggestions = ["Photosynthesis", "Mitosis", "DNA Replication", "Natural selection", "Osmosis", "ATP", "Homeostasis", "Evolution", "Meiosis"];

function renderChips(suggestions, containerId, inputId) {
  const c = document.getElementById(containerId);
  const isEcon = containerId === 'econChips';
  c.innerHTML = suggestions.map(s =>
    `<button class="chip" onclick="setSearch('${inputId}','${isEcon?'econ':'bio'}','${s}')">${s}</button>`
  ).join('');
}

function setSearch(inputId, subject, value) {
  document.getElementById(inputId).value = value;
  doSearch(inputId, subject);
}

function doSearch(inputId, subject) {
  const q = document.getElementById(inputId).value.trim();
  const cardsId = subject + 'Cards';
  const metaId = subject + 'Meta';
  const terms = subject === 'econ' ? econTerms : bioTerms;
  const cards = document.getElementById(cardsId);
  const meta = document.getElementById(metaId);
  if (!q) { cards.innerHTML = ''; meta.textContent = ''; return; }
  const lower = q.toLowerCase();
  const results = terms.filter(t => t.title.toLowerCase().includes(lower) || t.def.toLowerCase().includes(lower));
  meta.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`;
  if (!results.length) { cards.innerHTML = `<div class="empty">No terms found for "<strong>${q}</strong>"</div>`; return; }
  cards.innerHTML = results.map(t =>
    `<div class="card"><div class="card-title">${t.title}</div><div class="card-def">${t.def}</div></div>`
  ).join('');
}

renderChips(econSuggestions, 'econChips', 'econSearch');
renderChips(bioSuggestions, 'bioChips', 'bioSearch');

document.getElementById('econSearch').addEventListener('input', () => doSearch('econSearch', 'econ'));
document.getElementById('bioSearch').addEventListener('input', () => doSearch('bioSearch', 'bio'));

document.querySelectorAll('.tab:not(.soon)').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panel = document.getElementById('tab-' + tab.dataset.tab) || document.getElementById('tab-soon');
    if (panel) panel.classList.add('active');
  });
});
</script>
